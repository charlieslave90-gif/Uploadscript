<script>
    let countdownInterval = null;
    let currentKey = null;
    
    async function fetchRandomKey() {
        try {
            const response = await fetch('/api/keys');
            if (response.ok) {
                const data = await response.json();
                if (data.success && data.keys && data.keys.length > 0) {
                    const randomIndex = Math.floor(Math.random() * data.keys.length);
                    return data.keys[randomIndex].key;
                }
            }
        } catch (error) {
            console.warn('API fetch failed, using fallback list');
        }
        
        const fallbackKeys = [
            "Free_3YKLALOJVQLTAIHNE",
            "Free_3UGIXSZZTNNPPHZIB",
            "Free_3YUEURTIPQRMODNZP",
            "Free_3SAMMYHXXDZOIMONI",
            "Free_3TABJXRRKDZRIWJCX",
            "Free_3DROAVJVJFUKDEHSE",
            "Free_3UYMHNIURNNHTOCEN",
            "Free_3SQZYILHNSFBIRJGS",
            "free_findajobjobsahur"
        ];
        const randomIndex = Math.floor(Math.random() * fallbackKeys.length);
        return fallbackKeys[randomIndex];
    }
    
    async function startCountdown(seconds = 12) {
        currentKey = await fetchRandomKey();
        const keyCodeElem = document.getElementById('keyCode');
        if (keyCodeElem) keyCodeElem.innerText = currentKey;
        
        let timeLeft = seconds;
        const timerDiv = document.getElementById('countdownTimer');
        const countdownContainer = document.getElementById('countdownContainer');
        const keyDisplay = document.getElementById('keyDisplay');
        
        countdownInterval = setInterval(() => {
            timeLeft--;
            if (timerDiv) timerDiv.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                countdownContainer.style.display = 'none';
                keyDisplay.style.display = 'block';
                showToast('✅ Key unlocked! You can now copy it.');
            }
        }, 1000);
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.right = '20px';
        toast.style.background = '#1e2f3f';
        toast.style.color = 'white';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '40px';
        toast.style.zIndex = '1000';
        toast.style.fontSize = '0.85rem';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    document.getElementById('copyBtn').addEventListener('click', function() {
        if (currentKey) {
            navigator.clipboard.writeText(currentKey).then(() => {
                const successDiv = document.getElementById('copySuccess');
                successDiv.style.display = 'block';
                setTimeout(() => successDiv.style.display = 'none', 2000);
            });
        } else {
            showToast('❌ Key not loaded yet. Please wait.');
        }
    });
    
    startCountdown(12);
</script>
