<body>

    <script>
        const inputArea = document.getElementById('inputScript');
        const outputArea = document.getElementById('outputScript');
        const obfuscateBtn = document.getElementById('obfuscateBtn');
        const clearInputBtn = document.getElementById('clearInputBtn');
        const clearOutputBtn = document.getElementById('clearOutputBtn');
        const loadExampleBtn = document.getElementById('loadExampleBtn');
        const copyBtn = document.getElementById('copyBtn');
        const statsDiv = document.getElementById('stats');

        const enableXOR = document.getElementById('enableXOR');
        const enableRandomVars = document.getElementById('enableRandomVars');
        const enableAntiDebug = document.getElementById('enableAntiDebug');
        const enableControlFlow = document.getElementById('enableControlFlow');
        const enableDeadCode = document.getElementById('enableDeadCode');
        const enableMathObf = document.getElementById('enableMathObf');

        function showToast(message, isError = false) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#dc2626' : '#10b981';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 2500);
        }

        function randomString(length = 8) {
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function randomNumber(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // XOR encryption/decryption
        function xorString(str, key) {
            let result = '';
            for (let i = 0; i < str.length; i++) {
                result += String.fromCharCode(str.charCodeAt(i) ^ key);
            }
            return result;
        }

        // Obfuscate math expressions
        function obfuscateMath(expr) {
            const patterns = [
                { pattern: /(\d+)\s*\+\s*(\d+)/g, transform: (a,b) => `(${a}+${b})` },
                { pattern: /(\d+)\s*\*\s*(\d+)/g, transform: (a,b) => `(${a}*${b})` }
            ];
            let result = expr;
            // Replace numbers with obfuscated versions
            result = result.replace(/\b(\d+)\b/g, (match) => {
                if (match.length > 2 && Math.random() > 0.5) {
                    const a = randomNumber(1, 50);
                    const b = parseInt(match) - a;
                    return `(${a}+${b})`;
                }
                return match;
            });
            return result;
        }

        // Generate control flow obfuscation wrapper
        function controlFlowObfuscate(code) {
            const switchVar = '_' + randomString(8);
            const cases = [];
            const originalLines = code.split('\n');
            const chunks = [];
            
            for (let i = 0; i < originalLines.length; i += 3) {
                const chunk = originalLines.slice(i, i + 3).join('\n');
                if (chunk.trim()) chunks.push(chunk);
            }
            
            if (chunks.length < 2) return code;
            
            for (let i = 0; i < chunks.length; i++) {
                cases.push(`    [${i}] = function()\n        ${chunks[i]}\n    end`);
            }
            
            const flowCode = `do\n    local ${switchVar} = 0\n    local ${randomString(6)} = {\n${cases.join(',\n')}\n    }\n    while ${switchVar} < ${chunks.length} do\n        ${randomString(6)}[${switchVar}]()\n        ${switchVar} = ${switchVar} + 1\n    end\nend`;
            
            return flowCode;
        }

        // Anti-debug protection
        function antiDebugWrapper(code) {
            const checkVar = randomString(8);
            const timerVar = randomString(8);
            return `do\n    local ${checkVar} = debug and debug.getinfo or nil\n    if ${checkVar} then\n        error("Protected environment")\n    end\n    local ${timerVar} = os.clock()\n    ${code}\n    if os.clock() - ${timerVar} > 60 then\n        error("Execution timeout")\n    end\nend`;
        }

        // Generate dead code that doesn't affect functionality
        function generateDeadCode() {
            const deadPatterns = [
                `local ${randomString(5)} = math.random(1, 1000)`,
                `local ${randomString(5)} = (${randomNumber(1,500)} + ${randomNumber(1,500)}) * ${randomNumber(1,50)}`,
                `if ${randomString(4)} then ${randomString(4)} = false end`,
                `local ${randomString(6)} = string.char(${randomNumber(65,90)})`,
                `for ${randomString(4)} = 1, ${randomNumber(1,3)} do break end`,
                `local ${randomString(7)} = {${randomNumber(1,100)}, ${randomNumber(1,100)}}`,
                `do local ${randomString(5)} = ${Math.random() > 0.5 ? 'true' : 'false'} end`,
                `local ${randomString(5)} = os.clock() * ${randomNumber(1,100)}`
            ];
            return deadPatterns[Math.floor(Math.random() * deadPatterns.length)];
        }

        // Extract variable names from Lua code
        function extractVariableNames(code) {
            const patterns = [
                /local\s+([a-zA-Z_][a-zA-Z0-9_]*)/g,
                /function\s+([a-zA-Z_][a-zA-Z0-9_]*)/g,
                /for\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=/g
            ];
            const vars = new Set();
            for (const pattern of patterns) {
                let match;
                while ((match = pattern.exec(code)) !== null) {
                    vars.add(match[1]);
                }
            }
            return Array.from(vars);
        }

        // Replace variable names with random ones
        function replaceVariableNames(code, varMap) {
            let result = code;
            const sortedVars = Object.keys(varMap).sort((a,b) => b.length - a.length);
            for (const oldName of sortedVars) {
                const regex = new RegExp(`\\b${oldName}\\b`, 'g');
                result = result.replace(regex, varMap[oldName]);
            }
            return result;
        }

        // Main obfuscation function
        function hardObfuscate(code) {
            if (!code.trim()) {
                throw new Error('Please enter some Lua code to obfuscate');
            }

            let obfuscated = code;
            let stats = {
                originalLength: code.length,
                originalLines: code.split('\n').length,
                xorApplied: false,
                varRenames: 0,
                deadCodeAdded: 0,
                controlFlowApplied: false,
                antiDebugApplied: false
            };

            // Step 1: XOR string encoding
            if (enableXOR.checked) {
                const xorKey = randomNumber(1, 255);
                const stringPattern = /(["'])((?:(?!\1).)*?)\1/g;
                obfuscated = obfuscated.replace(stringPattern, (match, quote, content) => {
                    if (content.length < 2) return match;
                    const encrypted = xorString(content, xorKey);
                    let encoded = '';
                    for (let i = 0; i < encrypted.length; i++) {
                        encoded += '\\' + encrypted.charCodeAt(i);
                    }
                    return `(function(s) local r='';for i=1,#s do r=r..string.char(string.byte(s,i)~${xorKey}) end;return r end)("${encrypted}")`;
                });
                stats.xorApplied = true;
            }

            // Step 2: Random variable names
            if (enableRandomVars.checked) {
                const vars = extractVariableNames(obfuscated);
                const varMap = {};
                const reserved = { 'self':1, 'true':1, 'false':1, 'nil':1, 'and':1, 'or':1, 'not':1, 'function':1, 'local':1, 'end':1, 'if':1, 'then':1, 'else':1, 'elseif':1, 'for':1, 'do':1, 'while':1, 'repeat':1, 'until':1, 'return':1, 'break':1, 'goto':1 };
                for (const v of vars) {
                    if (!reserved[v] && v.length > 1) {
                        varMap[v] = '_' + randomString(randomNumber(5,10)) + randomNumber(10,999);
                        stats.varRenames++;
                    }
                }
                obfuscated = replaceVariableNames(obfuscated, varMap);
            }

            // Step 3: Math expression obfuscation
            if (enableMathObf.checked) {
                const mathPattern = /(\d+\s*[+\-*/]\s*\d+)/g;
                obfuscated = obfuscated.replace(mathPattern, (match) => {
                    return `(${match})`;
                });
            }

            // Step 4: Dead code injection
            if (enableDeadCode.checked) {
                const lines = obfuscated.split('\n');
                const injected = [];
                for (let i = 0; i < lines.length; i++) {
                    injected.push(lines[i]);
                    if (Math.random() > 0.7 && lines[i].trim().length > 0 && !lines[i].includes('end') && !lines[i].includes('then')) {
                        injected.push(generateDeadCode());
                        stats.deadCodeAdded++;
                    }
                }
                obfuscated = injected.join('\n');
            }

            // Step 5: Control flow obfuscation (wrap in switch)
            if (enableControlFlow.checked && obfuscated.split('\n').length > 10) {
                obfuscated = controlFlowObfuscate(obfuscated);
                stats.controlFlowApplied = true;
            }

            // Step 6: Anti-debug wrapper
            if (enableAntiDebug.checked) {
                obfuscated = antiDebugWrapper(obfuscated);
                stats.antiDebugApplied = true;
            }

            // Final cleanup - ensure no empty lines cause issues
            obfuscated = obfuscated.replace(/\n\s*\n/g, '\n');
            
            stats.obfuscatedLength = obfuscated.length;
            stats.obfuscatedLines = obfuscated.split('\n').length;
            stats.sizeIncrease = ((stats.obfuscatedLength - stats.originalLength) / stats.originalLength * 100).toFixed(1);
            
            return { code: obfuscated, stats };
        }

        function updateStatsDisplay(stats) {
            if (!stats) {
                statsDiv.innerHTML = '📊 Stats will appear after obfuscation';
                return;
            }
            statsDiv.innerHTML = `
                📏 Original: ${stats.originalLength} chars (${stats.originalLines} lines) | 
                🔒 Obfuscated: ${stats.obfuscatedLength} chars (${stats.obfuscatedLines} lines) | 
                📈 Size Increase: +${stats.sizeIncrease}% |
                🔀 Var Renames: ${stats.varRenames} |
                💀 Dead Code: ${stats.deadCodeAdded} blocks
                ${stats.xorApplied ? '| 🔐 XOR Encoded' : ''}
                ${stats.controlFlowApplied ? '| 🌀 Control Flow' : ''}
                ${stats.antiDebugApplied ? '| 🛡️ Anti-Debug' : ''}
            `;
        }

        function obfuscate() {
            const inputCode = inputArea.value;
            if (!inputCode.trim()) {
                showToast('❌ Please enter some Lua code to obfuscate', true);
                return;
            }

            try {
                const result = hardObfuscate(inputCode);
                outputArea.value = result.code;
                updateStatsDisplay(result.stats);
                showToast('✅ Script obfuscated successfully!', false);
            } catch (error) {
                showToast('❌ Obfuscation failed: ' + error.message, true);
                console.error(error);
            }
        }

        async function copyOutput() {
            const output = outputArea.value;
            if (!output.trim()) {
                showToast('❌ Nothing to copy', true);
                return;
            }
            try {
                await navigator.clipboard.writeText(output);
                showToast('📋 Copied to clipboard!', false);
            } catch (err) {
                showToast('❌ Failed to copy', true);
            }
        }

        function clearInput() {
            inputArea.value = '';
            showToast('🗑️ Input cleared', false);
        }

        function clearOutput() {
            outputArea.value = '';
            updateStatsDisplay(null);
            showToast('🗑️ Output cleared', false);
        }

        function loadExample() {
            const example = `-- Advanced GUI Script

gui.Parent = player.PlayerGui

frame.Parent = gui

    print("Button clicked!")
    frame.BackgroundColor3 = Color3.fromRGB(80, 80, 120)
end

local button = Instance.new("TextButton")
button.Size = UDim2.new(0, 200, 0, 50)
button.Position = UDim2.new(0.5, -100, 0.5, -25)
button.Text = "Click Me!"
button.Parent = frame
button.MouseButton1Click:Connect(onButtonClick)

            inputArea.value = example;
            showToast('📋 Example loaded', false);
        }

        obfuscateBtn.addEventListener('click', obfuscate);
        clearInputBtn.addEventListener('click', clearInput);
        clearOutputBtn.addEventListener('click', clearOutput);
        loadExampleBtn.addEventListener('click', loadExample);
        copyBtn.addEventListener('click', copyOutput);

        inputArea.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                obfuscate();
