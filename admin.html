<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ScriptHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .login-box, .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .login-box {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .script-list {
            margin-top: 2rem;
        }

        .script-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .script-info h3 {
            margin-bottom: 0.5rem;
            color: #0f172a;
        }

        .script-info p {
            color: #64748b;
            font-size: 0.9rem;
        }

        .delete-btn {
            background: #ef4444;
            width: auto;
            padding: 8px 16px;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .hidden {
            display: none;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logout-btn {
            background: #64748b;
            width: auto;
            padding: 8px 16px;
        }

        h2 {
            margin: 1.5rem 0 1rem 0;
            color: #0f172a;
        }

        hr {
            margin: 1rem 0;
            border: none;
            border-top: 2px solid #e2e8f0;
        }

        small {
            color: #64748b;
            font-size: 0.8rem;
        }

        .thumbnail-preview {
            max-width: 200px;
            margin-top: 10px;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .script-item {
                flex-direction: column;
                text-align: center;
            }
            .delete-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm" class="login-box">
            <h1 style="margin-bottom: 1.5rem;">🔐 Admin Login</h1>
            <div class="form-group">
                <input type="password" id="adminPassword" placeholder="Enter admin password" autocomplete="off">
            </div>
            <button onclick="login()">Login</button>
            <p style="margin-top: 1rem; color: #64748b; font-size: 0.85rem;">
                ⚠️ This is the admin panel. Keep this URL secret!
            </p>
        </div>

        <!-- Admin Panel (hidden until login) -->
        <div id="adminPanel" class="admin-panel hidden">
            <div class="header">
                <h1>📊 Admin Dashboard</h1>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
            
            <div id="alertMessage" class="hidden"></div>
            
            <h2>📤 Upload New Script</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <select id="scriptType" required>
                        <option value="code">Lua Script (Paste Code)</option>
                        <option value="link">External Link (Pastebin, LootLab, etc.)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <input type="text" id="title" placeholder="Script Title" required>
                </div>
                
                <div class="form-group">
                    <input type="text" id="author" placeholder="Author Name" required>
                </div>
                
                <div class="form-group">
                    <textarea id="description" rows="3" placeholder="Description" required></textarea>
                </div>
                
                <div class="form-group" id="codeGroup">
                    <textarea id="code" rows="8" placeholder="Lua Script Code"></textarea>
                </div>
                
                <div class="form-group hidden" id="linkGroup">
                    <input type="url" id="link" placeholder="External Link (Pastebin, LootLab, etc.)">
                </div>
                
                <div class="form-group">
                    <input type="url" id="youtubeUrl" placeholder="YouTube Video URL (optional)">
                    <small>Example: https://youtube.com/watch?v=xxxxx</small>
                </div>
                
                <div class="form-group">
                    <input type="file" id="thumbnail" accept="image/*">
                    <small>Thumbnail image (optional, JPG/PNG/GIF)</small>
                    <img id="thumbnailPreview" class="thumbnail-preview hidden" alt="Preview">
                </div>
                
                <button type="submit">📤 Upload Script</button>
            </form>

            <hr>

            <h2>🗑️ Manage Scripts</h2>
            <div id="scriptsList" class="script-list">
                <p>Loading scripts...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        
        // Check if already logged in
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            loadScripts();
        }
        
        function showAlert(message, isError = false) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = isError ? 'alert alert-error' : 'alert alert-success';
            alertDiv.textContent = message;
            alertDiv.classList.remove('hidden');
            setTimeout(() => alertDiv.classList.add('hidden'), 3000);
        }
        
        function login() {
            const password = document.getElementById('adminPassword').value;
            
            // CHANGE THIS PASSWORD TO YOUR OWN!
            const ADMIN_PASSWORD = 'ScripthubAdmin2024';
            
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadScripts();
                showAlert('✅ Logged in successfully!');
            } else {
                showAlert('❌ Wrong password!', true);
            }
        }
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
        }
        
        // Toggle script type
        const scriptTypeSelect = document.getElementById('scriptType');
        if (scriptTypeSelect) {
            scriptTypeSelect.addEventListener('change', function() {
                const codeGroup = document.getElementById('codeGroup');
                const linkGroup = document.getElementById('linkGroup');
                
                if (this.value === 'code') {
                    codeGroup.classList.remove('hidden');
                    linkGroup.classList.add('hidden');
                } else {
                    codeGroup.classList.add('hidden');
                    linkGroup.classList.remove('hidden');
                }
            });
        }
        
        // Get YouTube ID
        function getYouTubeId(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
        
        // Load all scripts
        async function loadScripts() {
            try {
                const response = await fetch(`${API_URL}/api/scripts`);
                if (!response.ok) throw new Error('Failed to load');
                const scripts = await response.json();
                displayScripts(scripts);
            } catch (error) {
                document.getElementById('scriptsList').innerHTML = '<p>❌ Error loading scripts</p>';
                console.error(error);
            }
        }
        
        function displayScripts(scripts) {
            const container = document.getElementById('scriptsList');
            
            if (!scripts || scripts.length === 0) {
                container.innerHTML = '<p>No scripts yet. Upload one!</p>';
                return;
            }
            
            container.innerHTML = scripts.map(script => `
                <div class="script-item">
                    <div class="script-info">
                        <h3>${escapeHtml(script.title)}</h3>
                        <p>By: ${escapeHtml(script.author)} | ❤️ ${script.likes || 0} | 📅 ${new Date(script.createdAt).toLocaleDateString()}</p>
                        <p style="font-size: 0.8rem; color: #94a3b8;">ID: ${script.id}</p>
                    </div>
                    <button onclick="deleteScript('${script.id}')" class="delete-btn">🗑️ Delete</button>
                </div>
            `).join('');
        }
        
        // Delete script
        async function deleteScript(id) {
            if (!confirm('⚠️ Are you sure you want to delete this script? This cannot be undone!')) {
                return;
            }
            
            const ADMIN_PASSWORD = 'ScripthubAdmin2024';
            
            try {
                const response = await fetch(`${API_URL}/api/scripts?id=${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Password': ADMIN_PASSWORD
                    }
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showAlert('✅ Script deleted successfully!');
                    loadScripts(); // Refresh list
                } else {
                    showAlert('❌ ' + (result.error || 'Delete failed'), true);
                }
            } catch (error) {
                showAlert('❌ Error deleting script: ' + error.message, true);
            }
        }
        
        // Upload script
        const uploadForm = document.getElementById('uploadForm');
        if (uploadForm) {
            uploadForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const ADMIN_PASSWORD = 'ScripthubAdmin2024';
                const scriptType = document.getElementById('scriptType').value;
                const title = document.getElementById('title').value.trim();
                const author = document.getElementById('author').value.trim();
                const description = document.getElementById('description').value.trim();
                const youtubeUrl = document.getElementById('youtubeUrl').value.trim();
                const thumbnailFile = document.getElementById('thumbnail').files[0];
                
                if (!title || !author || !description) {
                    showAlert('Please fill in title, author, and description', true);
                    return;
                }
                
                let scriptData = { 
                    type: scriptType, 
                    title, 
                    author, 
                    description 
                };
                
                // Add YouTube ID
                if (youtubeUrl) {
                    const youtubeId = getYouTubeId(youtubeUrl);
                    if (youtubeId) {
                        scriptData.youtubeId = youtubeId;
                    }
                }
                
                // Handle thumbnail
                if (thumbnailFile) {
                    const reader = new FileReader();
                    const thumbnailPromise = new Promise((resolve) => {
                        reader.onload = (event) => {
                            scriptData.thumbnail = event.target.result;
                            resolve();
                        };
                        reader.readAsDataURL(thumbnailFile);
                    });
                    await thumbnailPromise;
                }
                
                // Add code or link
                if (scriptType === 'code') {
                    const code = document.getElementById('code').value.trim();
                    if (!code) {
                        showAlert('Please enter script code', true);
                        return;
                    }
                    scriptData.code = code;
                } else {
                    const link = document.getElementById('link').value.trim();
                    if (!link) {
                        showAlert('Please enter a link', true);
                        return;
                    }
                    scriptData.link = link;
                }
                
                const uploadBtn = e.target.querySelector('button');
                const originalText = uploadBtn.textContent;
                uploadBtn.textContent = 'Uploading...';
                uploadBtn.disabled = true;
                
                try {
                    const response = await fetch(`${API_URL}/api/scripts`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'X-Admin-Password': ADMIN_PASSWORD
                        },
                        body: JSON.stringify(scriptData)
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        showAlert('✅ Script uploaded successfully!');
                        uploadForm.reset();
                        document.getElementById('thumbnailPreview').classList.add('hidden');
                        loadScripts();
                    } else {
                        showAlert('❌ ' + (result.error || 'Upload failed'), true);
                    }
                } catch (error) {
                    showAlert('❌ Upload failed: ' + error.message, true);
                } finally {
                    uploadBtn.textContent = originalText;
                    uploadBtn.disabled = false;
                }
            });
        }
        
        // Thumbnail preview
        const thumbnailInput = document.getElementById('thumbnail');
        if (thumbnailInput) {
            thumbnailInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const preview = document.getElementById('thumbnailPreview');
                        preview.src = event.target.result;
                        preview.classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
