<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .login-card {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background: #5a67d8;
        }
        .delete-btn {
            background: #e53e3e;
            margin-top: 10px;
        }
        .delete-btn:hover {
            background: #c53030;
        }
        .script-item {
            background: #f7fafc;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }
        .hidden {
            display: none;
        }
        .alert {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .alert-success {
            background: #c6f6d5;
            color: #22543d;
        }
        .alert-error {
            background: #fed7d7;
            color: #742a2a;
        }
        hr {
            margin: 20px 0;
        }
        h2 {
            margin-bottom: 15px;
        }
        .slug-preview {
            background: #f0f0f0;
            padding: 8px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .info-text {
            font-size: 0.8rem;
            color: #718096;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm" class="card login-card">
            <h1>🔐 Admin Login</h1>
            <input type="password" id="password" placeholder="Enter password">
            <button onclick="login()">Login</button>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" class="hidden">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>📊 Admin Panel</h1>
                    <button onclick="logout()" style="width: auto; background: #718096;">Logout</button>
                </div>
            </div>

            <div id="alertMsg" class="hidden"></div>

            <!-- Upload Section -->
            <div class="card">
                <h2>📤 Upload Script</h2>
                <form id="uploadForm">
                    <select id="type" required>
                        <option value="code">Lua Script</option>
                        <option value="link">External Link</option>
                    </select>
                    <input type="text" id="title" placeholder="Title" required>
                    
                    <!-- Custom URL Slug -->
                    <input type="text" id="customSlug" placeholder="Custom URL (optional - e.g., my-awesome-script)">
                    <div id="slugPreview" class="slug-preview hidden"></div>
                    <div class="info-text">Leave blank to auto-generate from title. Use letters, numbers, and hyphens only.</div>
                    
                    <input type="text" id="author" placeholder="Author" required>
                    <textarea id="description" rows="3" placeholder="Description" required></textarea>
                    <div id="codeDiv">
                        <textarea id="code" rows="8" placeholder="Lua Script Code"></textarea>
                    </div>
                    <div id="linkDiv" class="hidden">
                        <input type="url" id="link" placeholder="External Link (https://...)">
                    </div>
                    <input type="url" id="youtube" placeholder="YouTube URL (optional)">
                    <input type="file" id="thumbnail" accept="image/*">
                    <button type="submit">Upload Script</button>
                </form>
            </div>

            <!-- Delete Section -->
            <div class="card">
                <h2>🗑️ Delete Scripts</h2>
                <div id="scriptsList">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const ADMIN_PASSWORD = 'karah123'; // CHANGE THIS!
        
        // Check if already logged in
        if (localStorage.getItem('admin') === 'true') {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            loadScripts();
        }
        
        function login() {
            const pwd = document.getElementById('password').value;
            if (pwd === ADMIN_PASSWORD) {
                localStorage.setItem('admin', 'true');
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                showAlert('Logged in!', false);
                loadScripts();
            } else {
                showAlert('Wrong password!', true);
            }
        }
        
        function logout() {
            localStorage.removeItem('admin');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
        }
        
        function showAlert(msg, isError) {
            const alertDiv = document.getElementById('alertMsg');
            alertDiv.className = isError ? 'alert alert-error' : 'alert alert-success';
            alertDiv.textContent = msg;
            alertDiv.classList.remove('hidden');
            setTimeout(() => alertDiv.classList.add('hidden'), 3000);
        }
        
        // Live slug preview
        const titleInput = document.getElementById('title');
        const customSlugInput = document.getElementById('customSlug');
        const slugPreview = document.getElementById('slugPreview');
        
        function updateSlugPreview() {
            let slug = customSlugInput.value.trim();
            if (!slug) {
                slug = titleInput.value.trim()
                    .toLowerCase()
                    .replace(/[^a-z0-9]+/g, '-')
                    .replace(/^-+|-+$/g, '');
            }
            if (slug) {
                slugPreview.innerHTML = `🔗 Your script will be at: <strong>/${slug}</strong>`;
                slugPreview.classList.remove('hidden');
            } else {
                slugPreview.classList.add('hidden');
            }
        }
        
        titleInput.addEventListener('input', updateSlugPreview);
        customSlugInput.addEventListener('input', updateSlugPreview);
        
        // Toggle script type
        document.getElementById('type').addEventListener('change', function() {
            if (this.value === 'code') {
                document.getElementById('codeDiv').classList.remove('hidden');
                document.getElementById('linkDiv').classList.add('hidden');
            } else {
                document.getElementById('codeDiv').classList.add('hidden');
                document.getElementById('linkDiv').classList.remove('hidden');
            }
        });
        
        // Load scripts
        async function loadScripts() {
            try {
                const res = await fetch(`${API_URL}/api/scripts`);
                const scripts = await res.json();
                const container = document.getElementById('scriptsList');
                
                if (!scripts || scripts.length === 0) {
                    container.innerHTML = '<p>No scripts found.</p>';
                    return;
                }
                
                container.innerHTML = scripts.map(s => `
                    <div class="script-item">
                        <strong>${escapeHtml(s.title)}</strong><br>
                        By: ${escapeHtml(s.author)} | ❤️ ${s.likes || 0}<br>
                        <small>🔗 URL: /${s.slug || s.id}</small><br>
                        <small>ID: ${s.id}</small><br>
                        <button onclick="deleteScript('${s.id}')" class="delete-btn">Delete</button>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('scriptsList').innerHTML = '<p>Error loading scripts. Make sure API is working.</p>';
            }
        }
        
        // Delete script
        async function deleteScript(id) {
            if (!confirm('Delete this script?')) return;
            
            try {
                const res = await fetch(`${API_URL}/api/scripts?id=${id}`, {
                    method: 'DELETE',
                    headers: { 'X-Admin-Password': ADMIN_PASSWORD }
                });
                
                if (res.ok) {
                    showAlert('Deleted!', false);
                    loadScripts();
                } else {
                    const data = await res.json();
                    showAlert(data.error || 'Delete failed', true);
                }
            } catch (err) {
                showAlert('Error: ' + err.message, true);
            }
        }
        
        // Upload script
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const type = document.getElementById('type').value;
            const title = document.getElementById('title').value.trim();
            const customSlug = document.getElementById('customSlug').value.trim();
            const author = document.getElementById('author').value.trim();
            const description = document.getElementById('description').value.trim();
            const youtubeUrl = document.getElementById('youtube').value.trim();
            
            if (!title || !author || !description) {
                showAlert('Please fill all required fields', true);
                return;
            }
            
            let scriptData = { type, title, author, description };
            
            // Add custom slug if provided
            if (customSlug) {
                scriptData.customSlug = customSlug;
            }
            
            // YouTube ID
            if (youtubeUrl) {
                const match = youtubeUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/);
                if (match) scriptData.youtubeId = match[1];
            }
            
            // Thumbnail
            const thumbFile = document.getElementById('thumbnail').files[0];
            if (thumbFile) {
                const reader = new FileReader();
                const thumbData = await new Promise((resolve) => {
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(thumbFile);
                });
                scriptData.thumbnail = thumbData;
            }
            
            // Code or Link
            if (type === 'code') {
                const code = document.getElementById('code').value.trim();
                if (!code) {
                    showAlert('Enter script code', true);
                    return;
                }
                scriptData.code = code;
            } else {
                const link = document.getElementById('link').value.trim();
                if (!link) {
                    showAlert('Enter a link', true);
                    return;
                }
                scriptData.link = link;
            }
            
            const btn = e.target.querySelector('button');
            btn.textContent = 'Uploading...';
            btn.disabled = true;
            
            try {
                const res = await fetch(`${API_URL}/api/scripts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Password': ADMIN_PASSWORD
                    },
                    body: JSON.stringify(scriptData)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showAlert(`✅ Uploaded! URL: /${data.slug}`, false);
                    e.target.reset();
                    slugPreview.classList.add('hidden');
                    loadScripts();
                } else {
                    showAlert(data.error || 'Upload failed', true);
                }
            } catch (err) {
                showAlert('Error: ' + err.message, true);
            } finally {
                btn.textContent = 'Upload Script';
                btn.disabled = false;
            }
        });
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
