<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ScriptHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .login-card {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: #5a67d8;
        }

        .delete-btn {
            background: #e53e3e;
        }

        .delete-btn:hover {
            background: #c53030;
        }

        .edit-btn {
            background: #48bb78;
        }

        .edit-btn:hover {
            background: #38a169;
        }

        .script-item {
            background: #f7fafc;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .task-badge {
            display: inline-block;
            background: #e0e7ff;
            color: #4f46e5;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin: 5px 5px 0 0;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .hidden {
            display: none;
        }

        .alert {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
        }

        hr {
            margin: 20px 0;
        }

        h2 {
            margin-bottom: 15px;
        }

        .task-option {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .task-option:hover {
            border-color: #667eea;
            background: #f8fafc;
        }

        .task-option.selected {
            border-color: #48bb78;
            background: #f0fdf4;
        }

        .task-option input {
            width: auto;
            margin-right: 10px;
        }

        .task-option label {
            cursor: pointer;
            font-weight: 500;
        }

        .task-url-input {
            margin-top: 10px;
            padding-left: 25px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm" class="card login-card">
            <h1>🔐 Admin Login</h1>
            <input type="password" id="password" placeholder="Enter password">
            <button onclick="login()">Login</button>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" class="hidden">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                    <h1>📊 Admin Panel</h1>
                    <button onclick="logout()" style="width: auto; background: #718096;">Logout</button>
                </div>
            </div>

            <div id="alertMsg" class="hidden"></div>

            <!-- Upload Section -->
            <div class="card">
                <h2>📤 Upload New Script</h2>
                <form id="uploadForm">
                    <select id="type" required>
                        <option value="code">Lua Script</option>
                        <option value="link">External Link</option>
                    </select>
                    <input type="text" id="title" placeholder="Title" required>
                    <input type="text" id="author" placeholder="Author" required>
                    <textarea id="description" rows="3" placeholder="Description" required></textarea>
                    
                    <!-- Task Selection for Unlocking -->
                    <h3 style="margin: 15px 0 10px 0;">🔓 Unlock Requirements</h3>
                    <div id="taskSelection">
                        <div class="task-option" onclick="selectTask('lootlab')">
                            <input type="radio" name="unlockTask" value="lootlab" id="taskLootlab">
                            <label for="taskLootlab">🔗 Visit LootLab Link</label>
                            <div id="lootlabUrlDiv" class="task-url-input hidden">
                                <input type="url" id="lootlabUrl" placeholder="https://loot-link.com/s?xxxxx">
                            </div>
                        </div>
                        <div class="task-option" onclick="selectTask('ad')">
                            <input type="radio" name="unlockTask" value="ad" id="taskAd">
                            <label for="taskAd">📺 Watch 10 Second Ad</label>
                        </div>
                    </div>
                    
                    <div id="codeDiv">
                        <textarea id="code" rows="8" placeholder="Lua Script Code"></textarea>
                    </div>
                    <div id="linkDiv" class="hidden">
                        <input type="url" id="link" placeholder="External Link (https://...)">
                    </div>
                    <input type="url" id="youtube" placeholder="YouTube URL (optional)">
                    <input type="file" id="thumbnail" accept="image/*">
                    <button type="submit">📤 Upload Script</button>
                </form>
            </div>

            <!-- Scripts List -->
            <div class="card">
                <h2>📜 Manage Scripts</h2>
                <div id="scriptsList">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Edit Script Modal -->
    <div id="editScriptModal" class="modal">
        <div class="modal-content">
            <h2>✏️ Edit Script</h2>
            <form id="editScriptForm">
                <input type="hidden" id="editScriptId">
                <input type="text" id="editTitle" placeholder="Title" required>
                <input type="text" id="editAuthor" placeholder="Author" required>
                <textarea id="editDescription" rows="3" placeholder="Description" required></textarea>
                
                <h3 style="margin: 15px 0 10px 0;">🔓 Unlock Requirements</h3>
                <div id="editTaskSelection">
                    <div class="task-option" onclick="editSelectTask('lootlab')">
                        <input type="radio" name="editUnlockTask" value="lootlab" id="editTaskLootlab">
                        <label>🔗 Visit LootLab Link</label>
                        <div id="editLootlabUrlDiv" class="task-url-input hidden">
                            <input type="url" id="editLootlabUrl" placeholder="https://loot-link.com/s?xxxxx">
                        </div>
                    </div>
                    <div class="task-option" onclick="editSelectTask('ad')">
                        <input type="radio" name="editUnlockTask" value="ad" id="editTaskAd">
                        <label>📺 Watch 10 Second Ad</label>
                    </div>
                </div>
                
                <select id="editType">
                    <option value="code">Lua Script</option>
                    <option value="link">External Link</option>
                </select>
                <div id="editCodeDiv">
                    <textarea id="editCode" rows="8" placeholder="Lua Script Code"></textarea>
                </div>
                <div id="editLinkDiv" class="hidden">
                    <input type="url" id="editLink" placeholder="External Link">
                </div>
                <input type="url" id="editYoutube" placeholder="YouTube URL">
                <button type="submit">💾 Save Changes</button>
                <button type="button" onclick="closeEditModal()" style="background: #718096;">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const ADMIN_PASSWORD = 'karah123';
        
        function selectTask(type) {
            document.querySelectorAll('#taskSelection .task-option').forEach(opt => opt.classList.remove('selected'));
            if (type === 'lootlab') {
                document.getElementById('taskLootlab').checked = true;
                document.getElementById('lootlabUrlDiv').classList.remove('hidden');
                document.getElementById('taskLootlab').closest('.task-option').classList.add('selected');
            } else {
                document.getElementById('taskAd').checked = true;
                document.getElementById('lootlabUrlDiv').classList.add('hidden');
                document.getElementById('taskAd').closest('.task-option').classList.add('selected');
            }
        }
        
        function editSelectTask(type) {
            document.querySelectorAll('#editTaskSelection .task-option').forEach(opt => opt.classList.remove('selected'));
            if (type === 'lootlab') {
                document.getElementById('editTaskLootlab').checked = true;
                document.getElementById('editLootlabUrlDiv').classList.remove('hidden');
                document.getElementById('editTaskLootlab').closest('.task-option').classList.add('selected');
            } else {
                document.getElementById('editTaskAd').checked = true;
                document.getElementById('editLootlabUrlDiv').classList.add('hidden');
                document.getElementById('editTaskAd').closest('.task-option').classList.add('selected');
            }
        }
        
        function showAlert(msg, isError) {
            const alertDiv = document.getElementById('alertMsg');
            alertDiv.className = isError ? 'alert alert-error' : 'alert alert-success';
            alertDiv.textContent = msg;
            alertDiv.classList.remove('hidden');
            setTimeout(() => alertDiv.classList.add('hidden'), 3000);
        }
        
        async function loadScripts() {
            try {
                const res = await fetch(`${API_URL}/api/scripts`);
                const scripts = await res.json();
                const container = document.getElementById('scriptsList');
                
                if (!scripts || scripts.length === 0) {
                    container.innerHTML = '<p>No scripts found.</p>';
                    return;
                }
                
                container.innerHTML = scripts.map(script => {
                    let taskDisplay = '';
                    if (script.unlockTask === 'lootlab') {
                        taskDisplay = `<span class="task-badge">🔗 LootLab: ${script.lootlabUrl || ''}</span>`;
                    } else if (script.unlockTask === 'ad') {
                        taskDisplay = `<span class="task-badge">📺 Watch 10s Ad</span>`;
                    }
                    return `
                        <div class="script-item">
                            <div class="script-header">
                                <div>
                                    <strong>${escapeHtml(script.title)}</strong><br>
                                    By: ${escapeHtml(script.author)} | ❤️ ${script.likes || 0}<br>
                                    <small>ID: ${script.id}</small><br>
                                    ${taskDisplay}
                                </div>
                                <div class="button-group">
                                    <button onclick="editScript('${script.id}')" class="edit-btn" style="width: auto; padding: 5px 15px;">✏️ Edit</button>
                                    <button onclick="deleteScript('${script.id}')" class="delete-btn" style="width: auto; padding: 5px 15px;">🗑️ Delete</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById('scriptsList').innerHTML = '<p>Error loading scripts</p>';
            }
        }
        
        async function editScript(id) {
            try {
                const res = await fetch(`${API_URL}/api/scripts?id=${id}`);
                const script = await res.json();
                
                document.getElementById('editScriptId').value = script.id;
                document.getElementById('editTitle').value = script.title;
                document.getElementById('editAuthor').value = script.author;
                document.getElementById('editDescription').value = script.description;
                document.getElementById('editType').value = script.type;
                document.getElementById('editYoutube').value = script.youtubeId || '';
                
                // Set unlock task
                if (script.unlockTask === 'lootlab') {
                    document.getElementById('editTaskLootlab').checked = true;
                    document.getElementById('editLootlabUrl').value = script.lootlabUrl || '';
                    document.getElementById('editLootlabUrlDiv').classList.remove('hidden');
                    document.getElementById('editTaskLootlab').closest('.task-option').classList.add('selected');
                } else {
                    document.getElementById('editTaskAd').checked = true;
                    document.getElementById('editLootlabUrlDiv').classList.add('hidden');
                    document.getElementById('editTaskAd').closest('.task-option').classList.add('selected');
                }
                
                if (script.type === 'code') {
                    document.getElementById('editCodeDiv').classList.remove('hidden');
                    document.getElementById('editLinkDiv').classList.add('hidden');
                    document.getElementById('editCode').value = script.code || '';
                } else {
                    document.getElementById('editCodeDiv').classList.add('hidden');
                    document.getElementById('editLinkDiv').classList.remove('hidden');
                    document.getElementById('editLink').value = script.link || '';
                }
                
                document.getElementById('editScriptModal').style.display = 'flex';
            } catch (err) {
                showAlert('Error loading script', true);
            }
        }
        
        async function updateScript(scriptData) {
            try {
                const res = await fetch(`${API_URL}/api/scripts`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Password': ADMIN_PASSWORD
                    },
                    body: JSON.stringify(scriptData)
                });
                
                if (res.ok) {
                    showAlert('✅ Script updated!', false);
                    loadScripts();
                    closeEditModal();
                } else {
                    const data = await res.json();
                    showAlert(data.error || 'Update failed', true);
                }
            } catch (err) {
                showAlert('Error updating script', true);
            }
        }
        
        async function deleteScript(id) {
            if (!confirm('Delete this script?')) return;
            try {
                const res = await fetch(`${API_URL}/api/scripts?id=${id}`, {
                    method: 'DELETE',
                    headers: { 'X-Admin-Password': ADMIN_PASSWORD }
                });
                if (res.ok) {
                    showAlert('✅ Script deleted!', false);
                    loadScripts();
                } else {
                    showAlert('Delete failed', true);
                }
            } catch (err) {
                showAlert('Error deleting script', true);
            }
        }
        
        document.getElementById('type')?.addEventListener('change', function() {
            if (this.value === 'code') {
                document.getElementById('codeDiv').classList.remove('hidden');
                document.getElementById('linkDiv').classList.add('hidden');
            } else {
                document.getElementById('codeDiv').classList.add('hidden');
                document.getElementById('linkDiv').classList.remove('hidden');
            }
        });
        
        document.getElementById('editType')?.addEventListener('change', function() {
            if (this.value === 'code') {
                document.getElementById('editCodeDiv').classList.remove('hidden');
                document.getElementById('editLinkDiv').classList.add('hidden');
            } else {
                document.getElementById('editCodeDiv').classList.add('hidden');
                document.getElementById('editLinkDiv').classList.remove('hidden');
            }
        });
        
        document.getElementById('uploadForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const type = document.getElementById('type').value;
            const title = document.getElementById('title').value.trim();
            const author = document.getElementById('author').value.trim();
            const description = document.getElementById('description').value.trim();
            const youtubeUrl = document.getElementById('youtube').value.trim();
            
            // Get unlock task
            let unlockTask = null;
            let lootlabUrl = null;
            if (document.getElementById('taskLootlab').checked) {
                unlockTask = 'lootlab';
                lootlabUrl = document.getElementById('lootlabUrl').value.trim();
                if (!lootlabUrl) {
                    showAlert('Please enter LootLab URL', true);
                    return;
                }
            } else if (document.getElementById('taskAd').checked) {
                unlockTask = 'ad';
            } else {
                showAlert('Please select an unlock requirement', true);
                return;
            }
            
            let scriptData = { type, title, author, description, unlockTask, lootlabUrl };
            
            if (youtubeUrl) {
                const match = youtubeUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/);
                if (match) scriptData.youtubeId = match[1];
            }
            
            const thumbFile = document.getElementById('thumbnail').files[0];
            if (thumbFile) {
                const reader = new FileReader();
                const thumbData = await new Promise((resolve) => {
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(thumbFile);
                });
                scriptData.thumbnail = thumbData;
            }
            
            if (type === 'code') {
                const code = document.getElementById('code').value.trim();
                if (!code) { showAlert('Enter script code', true); return; }
                scriptData.code = code;
            } else {
                const link = document.getElementById('link').value.trim();
                if (!link) { showAlert('Enter a link', true); return; }
                scriptData.link = link;
            }
            
            const btn = e.target.querySelector('button');
            btn.textContent = 'Uploading...';
            btn.disabled = true;
            
            try {
                const res = await fetch(`${API_URL}/api/scripts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Admin-Password': ADMIN_PASSWORD },
                    body: JSON.stringify(scriptData)
                });
                
                if (res.ok) {
                    showAlert('✅ Uploaded!', false);
                    e.target.reset();
                    document.getElementById('lootlabUrlDiv').classList.add('hidden');
                    loadScripts();
                } else {
                    const data = await res.json();
                    showAlert(data.error || 'Upload failed', true);
                }
            } catch (err) {
                showAlert('Error: ' + err.message, true);
            } finally {
                btn.textContent = 'Upload Script';
                btn.disabled = false;
            }
        });
        
        document.getElementById('editScriptForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('editScriptId').value;
            const title = document.getElementById('editTitle').value.trim();
            const author = document.getElementById('editAuthor').value.trim();
            const description = document.getElementById('editDescription').value.trim();
            const type = document.getElementById('editType').value;
            const youtubeUrl = document.getElementById('editYoutube').value.trim();
            
            let unlockTask = null;
            let lootlabUrl = null;
            if (document.getElementById('editTaskLootlab').checked) {
                unlockTask = 'lootlab';
                lootlabUrl = document.getElementById('editLootlabUrl').value.trim();
                if (!lootlabUrl) {
                    showAlert('Please enter LootLab URL', true);
                    return;
                }
            } else if (document.getElementById('editTaskAd').checked) {
                unlockTask = 'ad';
            }
            
            let scriptData = { id, type, title, author, description, unlockTask, lootlabUrl };
            
            if (youtubeUrl) {
                const match = youtubeUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/);
                if (match) scriptData.youtubeId = match[1];
            }
            
            if (type === 'code') {
                scriptData.code = document.getElementById('editCode').value.trim();
            } else {
                scriptData.link = document.getElementById('editLink').value.trim();
            }
            
            await updateScript(scriptData);
        });
        
        function closeEditModal() {
            document.getElementById('editScriptModal').style.display = 'none';
        }
        
        function login() {
            const pwd = document.getElementById('password').value;
            if (pwd === ADMIN_PASSWORD) {
                localStorage.setItem('admin', 'true');
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                showAlert('Logged in!', false);
                loadScripts();
            } else {
                showAlert('Wrong password!', true);
            }
        }
        
        function logout() {
            localStorage.removeItem('admin');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        if (localStorage.getItem('admin') === 'true') {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            loadScripts();
        }
    </script>
</body>
</html>
