<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ScriptHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .login-card {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: #5a67d8;
        }

        .delete-btn {
            background: #e53e3e;
        }

        .delete-btn:hover {
            background: #c53030;
        }

        .edit-btn {
            background: #48bb78;
        }

        .edit-btn:hover {
            background: #38a169;
        }

        .script-item, .key-item {
            background: #f7fafc;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .script-header, .key-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .key-code {
            font-family: monospace;
            font-size: 14px;
            background: #e2e8f0;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-active {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-inactive {
            background: #fed7d7;
            color: #742a2a;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .hidden {
            display: none;
        }

        .alert {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
        }

        hr {
            margin: 20px 0;
        }

        h2 {
            margin-bottom: 15px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #e2e8f0;
            color: #4a5568;
            width: auto;
            padding: 10px 20px;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }

        .key-info {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm" class="card login-card">
            <h1>🔐 Admin Login</h1>
            <input type="password" id="password" placeholder="Enter password">
            <button onclick="login()">Login</button>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" class="hidden">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                    <h1>📊 Admin Panel</h1>
                    <button onclick="logout()" style="width: auto; background: #718096;">Logout</button>
                </div>
            </div>

            <div id="alertMsg" class="hidden"></div>

            <!-- Tab Navigation -->
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('scripts')">📜 Manage Scripts</button>
                <button class="tab-btn" onclick="switchTab('keys')">🔑 Manage Keys</button>
            </div>

            <!-- Scripts Tab -->
            <div id="scriptsTab">
                <div class="card">
                    <h2>📤 Upload New Script</h2>
                    <form id="uploadForm">
                        <select id="type" required>
                            <option value="code">Lua Script</option>
                            <option value="link">External Link</option>
                        </select>
                        <input type="text" id="title" placeholder="Title" required>
                        <input type="text" id="author" placeholder="Author" required>
                        <textarea id="description" rows="3" placeholder="Description" required></textarea>
                        
                        <div id="codeDiv">
                            <textarea id="code" rows="8" placeholder="Lua Script Code"></textarea>
                        </div>
                        <div id="linkDiv" class="hidden">
                            <input type="url" id="link" placeholder="External Link (https://...)">
                        </div>
                        <input type="url" id="youtube" placeholder="YouTube URL (optional)">
                        <input type="file" id="thumbnail" accept="image/*">
                        <button type="submit">📤 Upload Script</button>
                    </form>
                </div>

                <div class="card">
                    <h2>📜 Manage Scripts</h2>
                    <div id="scriptsList">Loading...</div>
                </div>
            </div>

            <!-- Keys Tab -->
            <div id="keysTab" class="hidden">
                <div class="card">
                    <h2>➕ Add New Key</h2>
                    <form id="addKeyForm">
                        <input type="text" id="keyCode" placeholder="Key Code (e.g., SCX-88832-H44421-J3331)" required>
                        <input type="text" id="keyScriptId" placeholder="Script ID this key unlocks (optional)">
                        <select id="keyStatus">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                        <button type="submit">➕ Add Key</button>
                    </form>
                </div>

                <div class="card">
                    <h2>🔑 Manage Keys</h2>
                    <div id="keysList">Loading keys...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Key Modal -->
    <div id="editKeyModal" class="modal">
        <div class="modal-content">
            <h2>✏️ Edit Key</h2>
            <form id="editKeyForm">
                <input type="hidden" id="editKeyId">
                <input type="text" id="editKeyCode" placeholder="Key Code" required>
                <input type="text" id="editKeyScriptId" placeholder="Script ID (optional)">
                <select id="editKeyStatus">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
                <button type="submit">💾 Save Changes</button>
                <button type="button" onclick="closeEditKeyModal()" style="background: #718096;">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const ADMIN_PASSWORD = 'karah123';
        
        // Keys storage
        let keys = [];
        
        function loadKeys() {
            const savedKeys = localStorage.getItem('adminKeys');
            if (savedKeys) {
                keys = JSON.parse(savedKeys);
            } else {
                // Default keys including the new "dead rails" key
                keys = [
                    { id: '1', code: 'DEMO-KEY-12345', scriptId: '', status: 'active', createdAt: new Date().toISOString(), usedBy: [] },
                    { id: '2', code: 'SCX-88832-H44421-J3331', scriptId: '', status: 'active', createdAt: new Date().toISOString(), usedBy: [] },
                    { id: '3', code: 'lajewjew67', scriptId: '', status: 'active', createdAt: new Date().toISOString(), usedBy: [], description: 'Dead Rails Key' }
                ];
                saveKeys();
            }
            displayKeys();
        }
        
        function saveKeys() {
            localStorage.setItem('adminKeys', JSON.stringify(keys));
        }
        
        function displayKeys() {
            const container = document.getElementById('keysList');
            if (!keys || keys.length === 0) {
                container.innerHTML = '<p>No keys yet. Add some!</p>';
                return;
            }
            
            container.innerHTML = keys.map(key => `
                <div class="key-item">
                    <div class="key-header">
                        <div>
                            <strong><span class="key-code">${escapeHtml(key.code)}</span></strong>
                            ${key.description ? `<span class="badge" style="background:#e9d8fd; color:#553c9a; margin-left:8px;">${escapeHtml(key.description)}</span>` : ''}
                            <br>
                            <small>ID: ${key.id}</small><br>
                            <small>Script ID: ${key.scriptId || 'Any script'}</small><br>
                            <small>Status: <span class="badge ${key.status === 'active' ? 'badge-active' : 'badge-inactive'}">${key.status}</span></small>
                            <small>Used: ${key.usedBy?.length || 0} times</small>
                        </div>
                        <div class="button-group">
                            <button onclick="editKey('${key.id}')" class="edit-btn" style="width: auto; padding: 5px 15px;">✏️ Edit</button>
                            <button onclick="deleteKey('${key.id}')" class="delete-btn" style="width: auto; padding: 5px 15px;">🗑️ Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function addKey(code, scriptId, status, description = '') {
            const newKey = {
                id: Date.now().toString(),
                code: code.toUpperCase(),
                scriptId: scriptId || '',
                status: status || 'active',
                createdAt: new Date().toISOString(),
                usedBy: [],
                description: description
            };
            keys.push(newKey);
            saveKeys();
            displayKeys();
            showAlert('✅ Key added successfully!', false);
        }
        
        function editKey(id) {
            const key = keys.find(k => k.id === id);
            if (!key) return;
            
            document.getElementById('editKeyId').value = key.id;
            document.getElementById('editKeyCode').value = key.code;
            document.getElementById('editKeyScriptId').value = key.scriptId || '';
            document.getElementById('editKeyStatus').value = key.status;
            
            document.getElementById('editKeyModal').style.display = 'flex';
        }
        
        function updateKey(id, code, scriptId, status) {
            const index = keys.findIndex(k => k.id === id);
            if (index !== -1) {
                keys[index] = { ...keys[index], code: code.toUpperCase(), scriptId: scriptId || '', status: status };
                saveKeys();
                displayKeys();
                showAlert('✅ Key updated!', false);
            }
        }
        
        function deleteKey(id) {
            if (confirm('Delete this key?')) {
                keys = keys.filter(k => k.id !== id);
                saveKeys();
                displayKeys();
                showAlert('🗑️ Key deleted', false);
            }
        }
        
        function showAlert(msg, isError) {
            const alertDiv = document.getElementById('alertMsg');
            alertDiv.className = isError ? 'alert alert-error' : 'alert alert-success';
            alertDiv.textContent = msg;
            alertDiv.classList.remove('hidden');
            setTimeout(() => alertDiv.classList.add('hidden'), 3000);
        }
        
        async function loadScripts() {
            try {
                const res = await fetch(`${API_URL}/api/scripts`);
                const scripts = await res.json();
                const container = document.getElementById('scriptsList');
                
                if (!scripts || scripts.length === 0) {
                    container.innerHTML = '<p>No scripts found.</p>';
                    return;
                }
                
                container.innerHTML = scripts.map(script => `
                    <div class="script-item">
                        <div class="script-header">
                            <div>
                                <strong>${escapeHtml(script.title)}</strong><br>
                                By: ${escapeHtml(script.author)} | ❤️ ${script.likes || 0}<br>
                                <small>ID: ${script.id}</small><br>
                                <small>Type: ${script.type === 'code' ? '💻 Lua Script' : '🔗 External Link'}</small>
                            </div>
                            <div class="button-group">
                                <button onclick="editScript('${script.id}')" class="edit-btn" style="width: auto; padding: 5px 15px;">✏️ Edit</button>
                                <button onclick="deleteScript('${script.id}')" class="delete-btn" style="width: auto; padding: 5px 15px;">🗑️ Delete</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('scriptsList').innerHTML = '<p>Error loading scripts</p>';
            }
        }
        
        async function editScript(id) {
            try {
                const res = await fetch(`${API_URL}/api/scripts?id=${id}`);
                const script = await res.json();
                alert('Edit functionality - implement as needed');
            } catch (err) {
                showAlert('Error loading script', true);
            }
        }
        
        async function deleteScript(id) {
            if (!confirm('Delete this script?')) return;
            try {
                const res = await fetch(`${API_URL}/api/scripts?id=${id}`, {
                    method: 'DELETE',
                    headers: { 'X-Admin-Password': ADMIN_PASSWORD }
                });
                if (res.ok) {
                    showAlert('✅ Script deleted!', false);
                    loadScripts();
                } else {
                    showAlert('Delete failed', true);
                }
            } catch (err) {
                showAlert('Error deleting script', true);
            }
        }
        
        document.getElementById('type')?.addEventListener('change', function() {
            if (this.value === 'code') {
                document.getElementById('codeDiv').classList.remove('hidden');
                document.getElementById('linkDiv').classList.add('hidden');
            } else {
                document.getElementById('codeDiv').classList.add('hidden');
                document.getElementById('linkDiv').classList.remove('hidden');
            }
        });
        
        document.getElementById('uploadForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const type = document.getElementById('type').value;
            const title = document.getElementById('title').value.trim();
            const author = document.getElementById('author').value.trim();
            const description = document.getElementById('description').value.trim();
            const youtubeUrl = document.getElementById('youtube').value.trim();
            
            let scriptData = { type, title, author, description };
            
            if (youtubeUrl) {
                const match = youtubeUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/);
                if (match) scriptData.youtubeId = match[1];
            }
            
            const thumbFile = document.getElementById('thumbnail').files[0];
            if (thumbFile) {
                const reader = new FileReader();
                const thumbData = await new Promise((resolve) => {
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(thumbFile);
                });
                scriptData.thumbnail = thumbData;
            }
            
            if (type === 'code') {
                const code = document.getElementById('code').value.trim();
                if (!code) { showAlert('Enter script code', true); return; }
                scriptData.code = code;
            } else {
                const link = document.getElementById('link').value.trim();
                if (!link) { showAlert('Enter a link', true); return; }
                scriptData.link = link;
            }
            
            const btn = e.target.querySelector('button');
            btn.textContent = 'Uploading...';
            btn.disabled = true;
            
            try {
                const res = await fetch(`${API_URL}/api/scripts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Admin-Password': ADMIN_PASSWORD },
                    body: JSON.stringify(scriptData)
                });
                
                if (res.ok) {
                    showAlert('✅ Uploaded!', false);
                    e.target.reset();
                    loadScripts();
                } else {
                    const data = await res.json();
                    showAlert(data.error || 'Upload failed', true);
                }
            } catch (err) {
                showAlert('Error: ' + err.message, true);
            } finally {
                btn.textContent = 'Upload Script';
                btn.disabled = false;
            }
        });
        
        document.getElementById('addKeyForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const code = document.getElementById('keyCode').value.trim();
            const scriptId = document.getElementById('keyScriptId').value.trim();
            const status = document.getElementById('keyStatus').value;
            
            if (!code) {
                showAlert('Enter key code', true);
                return;
            }
            
            addKey(code, scriptId, status, '');
            e.target.reset();
        });
        
        document.getElementById('editKeyForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('editKeyId').value;
            const code = document.getElementById('editKeyCode').value.trim();
            const scriptId = document.getElementById('editKeyScriptId').value.trim();
            const status = document.getElementById('editKeyStatus').value;
            
            updateKey(id, code, scriptId, status);
            closeEditKeyModal();
        });
        
        function closeEditKeyModal() {
            document.getElementById('editKeyModal').style.display = 'none';
        }
        
        function switchTab(tab) {
            const scriptsTab = document.getElementById('scriptsTab');
            const keysTab = document.getElementById('keysTab');
            const btns = document.querySelectorAll('.tab-btn');
            
            btns.forEach(btn => btn.classList.remove('active'));
            
            if (tab === 'scripts') {
                scriptsTab.classList.remove('hidden');
                keysTab.classList.add('hidden');
                btns[0].classList.add('active');
                loadScripts();
            } else {
                scriptsTab.classList.add('hidden');
                keysTab.classList.remove('hidden');
                btns[1].classList.add('active');
                loadKeys();
            }
        }
        
        function login() {
            const pwd = document.getElementById('password').value;
            if (pwd === ADMIN_PASSWORD) {
                localStorage.setItem('admin', 'true');
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                showAlert('Logged in!', false);
                loadScripts();
                loadKeys();
            } else {
                showAlert('Wrong password!', true);
            }
        }
        
        function logout() {
            localStorage.removeItem('admin');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Check for admin session on load
        if (localStorage.getItem('admin') === 'true') {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            loadScripts();
            loadKeys();
        }
        
        // Function to specifically add the Dead Rails key if needed (can be called manually)
        window.ensureDeadRailsKey = function() {
            const deadRailsKeyExists = keys.some(k => k.code === 'lajewjew67');
            if (!deadRailsKeyExists) {
                keys.push({
                    id: Date.now().toString(),
                    code: 'lajewjew67',
                    scriptId: '',
                    status: 'active',
                    createdAt: new Date().toISOString(),
                    usedBy: [],
                    description: 'Dead Rails Key'
                });
                saveKeys();
                displayKeys();
                showAlert('🔑 Dead Rails Key (lajewjew67) added!', false);
            } else {
                showAlert('Dead Rails key already exists!', false);
            }
        };
    </script>
</body>
</html>
