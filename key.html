<script>
    const SECRET_KEY = 'approve-carbon-manual-728$#9';
    let countdownInterval = null;
    
    function startCountdown(seconds = 12) {
        let timeLeft = seconds;
        const timerDiv = document.getElementById('countdownTimer');
        const countdownContainer = document.getElementById('countdownContainer');
        const keyDisplay = document.getElementById('keyDisplay');
        
        countdownInterval = setInterval(() => {
            timeLeft--;
            if (timerDiv) timerDiv.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                countdownContainer.style.display = 'none';
                keyDisplay.style.display = 'block';
                showToast('✅ Key unlocked! You can now copy it.');
            }
        }, 1000);
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.right = '20px';
        toast.style.background = '#1e2f3f';
        toast.style.color = 'white';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '40px';
        toast.style.zIndex = '1000';
        toast.style.fontSize = '0.85rem';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Copy button functionality
    document.getElementById('copyBtn').addEventListener('click', function() {
        const keyText = document.getElementById('keyCode').innerText;
        navigator.clipboard.writeText(keyText).then(() => {
            const successDiv = document.getElementById('copySuccess');
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 2000);
        });
    });
