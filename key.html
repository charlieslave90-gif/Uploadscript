            <div class="ad-label" style="margin-bottom: 10px;">🔐 Verify Your Key</div>
            <input type="text" id="verifyInput" class="verify-input" placeholder="Paste your key here to verify...">
            <button id="verifyBtn" class="btn" style="background: #a855f7;">✓ Verify Key</button>

    </div>

<script>
    const API_URL = window.location.origin;
    let countdownInterval = null;
    let currentKey = 'approve-carbon-manual-728$#9';
    
    // Load the current key from API
    async function loadCurrentKey() {
        try {
            const response = await fetch(`${API_URL}/api/keys`);
            const data = await response.json();
            if (data.success && data.keys && data.keys.length > 0) {
                currentKey = data.keys[0].key;
                document.getElementById('keyCode').innerText = currentKey;
            }
        } catch (error) {
            console.error('Error loading key:', error);
        }
    }
    
    function startCountdown(seconds = 12) {
        let timeLeft = seconds;
        const timerDiv = document.getElementById('countdownTimer');
        const countdownContainer = document.getElementById('countdownContainer');
        const keyDisplay = document.getElementById('keyDisplay');
        
        countdownInterval = setInterval(() => {
            timeLeft--;
            if (timerDiv) timerDiv.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                countdownContainer.style.display = 'none';
                keyDisplay.style.display = 'block';
                
                // Store that key was unlocked
                localStorage.setItem('key_unlocked', currentKey);
                localStorage.setItem('key_unlocked_time', Date.now());
                
                showToast('✅ Key unlocked! You can now copy it.');
            }
        }, 1000);
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.right = '20px';
        toast.style.background = '#1e2f3f';
        toast.style.color = 'white';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '40px';
        toast.style.zIndex = '1000';
        toast.style.fontSize = '0.85rem';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Copy button functionality
    document.getElementById('copyBtn').addEventListener('click', function() {
        const keyText = document.getElementById('keyCode').innerText;
        navigator.clipboard.writeText(keyText).then(() => {
            const successDiv = document.getElementById('copySuccess');
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 2000);
        });
    });
    
    // Verify key functionality
    document.getElementById('verifyBtn').addEventListener('click', async function() {
        const inputKey = document.getElementById('verifyInput').value.trim();
        const resultDiv = document.getElementById('verifyResult');
        
        if (!inputKey) {
            resultDiv.innerHTML = '<span style="color: #dc2626;">❌ Please enter a key to verify</span>';
            return;
        }
        
        resultDiv.innerHTML = '<span style="color: #a855f7;">⏳ Verifying...</span>';
        
        try {
            const response = await fetch(`${API_URL}/api/keys?action=verify&key=${encodeURIComponent(inputKey)}`);
            const data = await response.json();
            
            if (data.verified) {
                resultDiv.innerHTML = '<span style="color: #10b981;">✅ Key verified successfully!</span>';
                showToast('✅ Key verified! Access granted.');
                // Store verified key
                localStorage.setItem('verified_key', inputKey);
            } else {
                resultDiv.innerHTML = '<span style="color: #dc2626;">❌ Invalid key! Please check and try again.</span>';
            }
        } catch (error) {
            resultDiv.innerHTML = '<span style="color: #dc2626;">❌ Error verifying key. Please try again.</span>';
        }
    });
    
    // Check if key was already unlocked before
    const savedTime = localStorage.getItem('key_unlocked_time');
    if (savedTime && (Date.now() - savedTime) < 86400000) { // 24 hour validity
        document.getElementById('countdownContainer').style.display = 'none';
        document.getElementById('keyDisplay').style.display = 'block';
    } else {
        loadCurrentKey();
        startCountdown(12);
    }
</script>
