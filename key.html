    <script>
        let allKeys = [];
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#dc2626' : '#10b981';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function copyKeyToClipboard(keyCode) {
            navigator.clipboard.writeText(keyCode);
            showToast('✅ Key copied: ' + keyCode);
        }
        
        function openExternalLink(url) {
            const currentLink = url;
            document.getElementById('externalLinkUrl').innerText = url;
            document.getElementById('linkModal').style.display = 'flex';
            window.currentLink = currentLink;
        }
        
        function closeModal() { 
            document.getElementById('linkModal').style.display = 'none'; 
        }
        
        function visitLink() { 
            window.open(window.currentLink, '_blank'); 
            closeModal(); 
        }
        
        // Load keys from localStorage (admin creates these)
        function loadKeys() {
            const savedKeys = localStorage.getItem('adminKeys');
            if (savedKeys) {
                allKeys = JSON.parse(savedKeys);
            } else {
                // Default demo keys if none exist
                allKeys = [
                    { id: '1', code: 'Key-SCX-88832-H44421-J3331', scriptId: '', status: 'active', createdAt: new Date().toISOString(), usedBy: [] },
                    { id: '2', code: 'SCX-t1ne-pql3s-68jew', scriptId: '', status: 'active', createdAt: new Date().toISOString(), usedBy: [] }
                ];
                localStorage.setItem('adminKeys', JSON.stringify(allKeys));
            }
            displayKeys();
        }
        
        function displayKeys() {
            const grid = document.getElementById('keysGrid');
            const searchTerm = document.getElementById('keySearchInput')?.value.toLowerCase() || '';
            
            let filteredKeys = allKeys.filter(k => k.status === 'active');
            
            if (searchTerm) {
                filteredKeys = filteredKeys.filter(k => 
                    k.code.toLowerCase().includes(searchTerm) ||
                    (k.scriptId && k.scriptId.toLowerCase().includes(searchTerm))
                );
            }
            
            if (!filteredKeys || filteredKeys.length === 0) {
                grid.innerHTML = '<div class="loading">No keys available. Check back later!</div>';
                return;
            }
            
            grid.innerHTML = filteredKeys.map(key => `
                <div class="script-card">
                    <span class="script-type">🔑 Premium Key</span>
                    <h3 style="font-family: monospace; font-size: 18px; word-break: break-all;">${escapeHtml(key.code)}</h3>
                    <div class="script-meta">
                        📅 Created: ${new Date(key.createdAt).toLocaleDateString()}
                        ${key.scriptId ? `<br>🎯 For Script ID: ${escapeHtml(key.scriptId)}` : '🎯 For: Any Script'}
                        ${key.usedBy ? `<br>📊 Used: ${key.usedBy.length} times` : ''}
                    </div>
                    <div class="script-footer">
                        <button onclick="copyKeyToClipboard('${escapeHtml(key.code)}')" class="btn-primary" style="flex: 1;">📋 Copy Key</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Key search
        document.getElementById('keySearchInput')?.addEventListener('input', () => displayKeys());
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load keys on page load
        loadKeys();
    </script>
