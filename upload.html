<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Script - ScriptHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">🎮 ScriptHub</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/upload.html">Upload Script</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="upload-container">
            <h1>Upload Your Script</h1>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="title">Script Title *</label>
                    <input type="text" id="title" required placeholder="e.g., Auto Farm Script">
                </div>

                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" rows="4" required placeholder="What does your script do?"></textarea>
                </div>

                <div class="form-group">
                    <label for="author">Author Name *</label>
                    <input type="text" id="author" required placeholder="Your username">
                </div>

                <div class="form-group">
                    <label for="code">Lua Script Code *</label>
                    <textarea id="code" rows="15" required placeholder="Paste your Lua script here..."></textarea>
                </div>

                <div id="validationResult" class="validation-result"></div>

                <button type="submit" class="btn-primary">Upload Script</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
                  </html>
