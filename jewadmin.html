        <div class="form-group">
            <label>🔑 Admin Key:</label>
            <input type="password" id="adminKey" placeholder="Enter your admin key">
            <div class="info">💡 Default admin key: Admin123!@# (change this in the code!)</div>

        <div class="form-group">
            <label>📝 Paste Title:</label>
            <input type="text" id="title" placeholder="Enter title for your paste">

            <label>📄 Content:</label>
            <textarea id="content" placeholder="Paste your code or text here..."></textarea>
        </div>
        
        <button id="submitBtn" onclick="createPaste()">📤 Create Paste</button>

            <h3>Preview:</h3>

            ✅ Paste created successfully!
            <div id="shareLinkBox" class="share-box" style="display: none;">
                <input type="text" id="shareLink" readonly>
                <button onclick="copyShareLink()">📋 Copy Link</button>

<script>
    const API_URL = window.location.origin + '/api.php';
    let currentPasteId = null;
    
    document.getElementById('content').addEventListener('input', function() {
        const preview = document.getElementById('preview');
        const previewContent = document.getElementById('previewContent');
        if (this.value) {
            preview.style.display = 'block';
            previewContent.textContent = this.value.substring(0, 500);
            if (this.value.length > 500) previewContent.textContent += '...';
        } else {
            preview.style.display = 'none';
        }
    });
    
    async function createPaste() {
        const adminKey = document.getElementById('adminKey').value;
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        const submitBtn = document.getElementById('submitBtn');
        
        // Clear previous messages
        document.getElementById('successMsg').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'none';
        
        if (!adminKey || !title || !content) {
            showError('Please fill in all fields including admin key');
            return;
        }
        
        // CHANGE THIS TO YOUR SECURE ADMIN KEY
        const VALID_ADMIN_KEY = 'Admin123!@#';
        
        if (adminKey !== VALID_ADMIN_KEY) {
            showError('Invalid admin key! Access denied.');
            return;
        }
        
        // Disable button while processing
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating...';
        
        try {
            const response = await fetch(`${API_URL}?action=create`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title, content })
            });
            
            // Check if response is ok
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            // Get response text first
            const responseText = await response.text();
            console.log('Raw response:', responseText);
            
            // Try to parse JSON
            let data;
            try {
                data = JSON.parse(responseText);
            } catch (e) {
                throw new Error('Server returned invalid JSON. Response: ' + responseText.substring(0, 200));
            }
            
            if (data.success) {
                currentPasteId = data.paste_id;
                const shareUrl = `${window.location.origin}/index.html?id=${data.paste_id}`;
                
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('shareLinkBox').style.display = 'flex';
                document.getElementById('shareLink').value = shareUrl;
                document.getElementById('errorMsg').style.display = 'none';
                
                // Clear form
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
                document.getElementById('adminKey').value = '';
                document.getElementById('preview').style.display = 'none';
                
                setTimeout(() => {
                    document.getElementById('successMsg').style.display = 'none';
                }, 8000);
            } else {
                showError(data.error || 'Failed to create paste');
            }
        } catch (error) {
            console.error('Error details:', error);
            showError('Error: ' + error.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '📤 Create Paste';
        }
    }
    
    function copyShareLink() {
        const linkInput = document.getElementById('shareLink');
        linkInput.select();
        navigator.clipboard.writeText(linkInput.value).then(() => {
            showToast('✅ Share link copied!');
        });
    }
    
    function showError(msg) {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = '❌ ' + msg;
        errorDiv.style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
        
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 5000);
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.right = '20px';
        toast.style.background = '#333';
        toast.style.color = 'white';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '5px';
        toast.style.zIndex = '1000';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
</script>
</body>
