    <div id="linkModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ External Link</h3>
            <p>You are about to leave ScriptHub.</p>
            <p id="externalLinkUrl" style="word-break:break-all;"></p>
            <div style="display:flex; gap:1rem; margin-top:1rem;">
                <button onclick="closeModal()" class="btn-secondary">Cancel</button>
                <button onclick="visitLink()" class="btn-primary">Continue →</button>
            </div>
        </div>

    <script>
        const API_URL = window.location.origin;
        let currentScripts = [];
        let currentFilter = 'all';
        let likedScripts = JSON.parse(localStorage.getItem('likedScripts') || '{}');
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#dc2626' : '#10b981';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function copyShareLink(scriptId) {
            const shareUrl = `${window.location.origin}/?id=${scriptId}`;
            navigator.clipboard.writeText(shareUrl);
            showToast('🔗 Share link copied!');
        }
        
        function showHome() {
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('detailPage').classList.add('hidden');
            window.history.pushState({}, '', '/');
            loadScripts();
        }
        
        function showDetail(id) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('detailPage').classList.remove('hidden');
            window.history.pushState({}, '', `/?id=${id}`);
            loadScriptDetail(id);
        }
        
        async function loadScripts() {
            try {
                const response = await fetch(`${API_URL}/api/scripts`);
                if (!response.ok) throw new Error('Failed to load');
                currentScripts = await response.json();
                applyFiltersAndSearch();
            } catch (error) {
                document.getElementById('scriptsGrid').innerHTML = '<div class="loading">Error loading scripts</div>';
            }
        }
        
        function applyFiltersAndSearch() {
            let filtered = [...currentScripts];
            
            if (currentFilter === 'code') {
                filtered = filtered.filter(s => s.type === 'code');
            } else if (currentFilter === 'link') {
                filtered = filtered.filter(s => s.type === 'link');
            } else if (currentFilter === 'popular') {
                filtered.sort((a, b) => (b.likes || 0) - (a.likes || 0));
            } else if (currentFilter === 'recent') {
                filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }
            
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            if (searchTerm) {
                filtered = filtered.filter(s => 
                    s.title.toLowerCase().includes(searchTerm) ||
                    s.author.toLowerCase().includes(searchTerm) ||
                    s.description.toLowerCase().includes(searchTerm)
                );
            }
            
            displayScripts(filtered);
        }
        
        function displayScripts(scripts) {
            const grid = document.getElementById('scriptsGrid');
            
            if (!scripts || scripts.length === 0) {
                grid.innerHTML = '<div class="loading">No scripts found.</div>';
                return;
            }
            
            grid.innerHTML = scripts.map(script => {
                const hasLiked = likedScripts[script.id];
                return `
                    <div class="script-card" onclick="showDetail('${script.id}')">
                        ${script.thumbnail ? `<img src="${script.thumbnail}" class="script-thumbnail">` : ''}
                        <span class="script-type">${script.type === 'code' ? '💻 Lua Script' : '🔗 External Link'}</span>
                        <h3>${escapeHtml(script.title)}</h3>
                        <div class="script-meta">
                            👤 ${escapeHtml(script.author)} • 📅 ${new Date(script.createdAt).toLocaleDateString()}
                            ${script.verified ? ' ✓ Verified' : ''}
                        </div>
                        <div class="script-description">${escapeHtml(script.description.substring(0, 120))}...</div>
                        <div class="script-footer">
                            <button onclick="event.stopPropagation(); likeScript('${script.id}')" class="like-btn" ${hasLiked ? 'disabled' : ''}>
                                ${hasLiked ? '❤️' : '🤍'} ${script.likes || 0}
                            </button>
                            <button onclick="event.stopPropagation(); showDetail('${script.id}')" class="btn-secondary">View →</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function loadScriptDetail(id) {
            try {
                const response = await fetch(`${API_URL}/api/scripts?id=${id}`);
                const script = await response.json();
                
                if (script.error) {
                    document.getElementById('scriptContent').innerHTML = '<div class="loading">Script not found</div>';
                    return;
                }
                
                const hasLiked = likedScripts[script.id];
                const shareUrl = `${window.location.origin}/?id=${script.id}`;
                
                let youtubeHtml = '';
                if (script.youtubeId) {
                    youtubeHtml = `
                        <div class="youtube-preview">
                            <iframe src="https://www.youtube.com/embed/${script.youtubeId}" frameborder="0" allowfullscreen></iframe>
                        </div>
                    `;
                }
                
                let contentHtml = '';
                if (script.type === 'code') {
                    contentHtml = `
                        ${youtubeHtml}
                        <h3>📝 Script Code:</h3>
                        <pre><code id="scriptCode">${escapeHtml(script.code)}</code></pre>
                        <button onclick="copyCodeDirect()" class="btn-primary" style="margin-top:1rem;">📋 Copy Code</button>
                    `;
                } else {
                    contentHtml = `
                        ${youtubeHtml}
                        <div style="text-align:center; padding:2rem; background:#f1f5f9; border-radius:20px;">
                            <button onclick="openExternalLink('${escapeHtml(script.link)}')" class="btn-primary">🔗 Open Script →</button>
                        </div>
                    `;
                }
                
                document.getElementById('scriptContent').innerHTML = `
                    <div class="script-detail">
                        <button onclick="showHome()" class="btn-secondary" style="margin-bottom:1rem;">← Back to Home</button>
                        
                        ${script.thumbnail ? `<img src="${script.thumbnail}" style="width:100%; max-height:300px; object-fit:cover; border-radius:20px; margin-bottom:1rem;">` : ''}
                        
                        <h1>${escapeHtml(script.title)}</h1>
                        <div class="script-meta">
                            👤 ${escapeHtml(script.author)} • 📅 ${new Date(script.createdAt).toLocaleDateString()}
                            ${script.verified ? ' ✓ Verified' : ''}
                        </div>
                        
                        <div class="share-box">
                            <p style="margin-bottom:0.5rem;"><strong>🔗 Share this script:</strong></p>
                            <input type="text" id="shareUrl" value="${shareUrl}" readonly onclick="this.select()">
                            <button onclick="copyShareLink('${script.id}')" class="btn-primary" style="margin-top:10px;">Copy Share Link</button>
                        </div>
                        
                        <p><strong>Description:</strong> ${escapeHtml(script.description)}</p>
                        ${contentHtml}
                        
                        <div style="margin-top:2rem; text-align:center;">
                            <button onclick="likeScript('${script.id}')" class="like-btn" style="font-size:1.2rem;" ${hasLiked ? 'disabled' : ''}>
                                ${hasLiked ? '❤️' : '🤍'} ${script.likes || 0} Likes
                            </button>
                        </div>
                    </div>
                `;
                
                const shareInput = document.getElementById('shareUrl');
                if (shareInput) {
                    shareInput.value = shareUrl;
                    shareInput.addEventListener('click', () => shareInput.select());
                }
                
            } catch (error) {
                document.getElementById('scriptContent').innerHTML = '<div class="loading">Script not found</div>';
            }
        }
        
        function copyCodeDirect() {
            const code = document.getElementById('scriptCode')?.innerText;
            if (code) {
                navigator.clipboard.writeText(code);
                showToast('✅ Code copied!');
            }
        }
        
        async function likeScript(id) {
            if (likedScripts[id]) {
                showToast('Already liked!', true);
                return;
            }
            try {
                const response = await fetch(`${API_URL}/api/scripts?action=like&id=${id}`, { method: 'POST' });
                if (response.ok) {
                    likedScripts[id] = true;
                    localStorage.setItem('likedScripts', JSON.stringify(likedScripts));
                    showToast('❤️ Liked!');
                    loadScripts();
                    const urlParams = new URLSearchParams(window.location.search);
                    const currentId = urlParams.get('id');
                    if (currentId) loadScriptDetail(currentId);
                }
            } catch (error) {
                showToast('Error', true);
            }
        }
        
        let currentLink = '';
        function openExternalLink(url) {
            currentLink = url;
            document.getElementById('externalLinkUrl').innerText = url;
            document.getElementById('linkModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('linkModal').style.display = 'none';
        }
        
        function visitLink() {
            window.open(currentLink, '_blank');
            closeModal();
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                applyFiltersAndSearch();
            });
        });
        
        document.getElementById('searchInput')?.addEventListener('input', () => applyFiltersAndSearch());
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function handleRouting() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (id) {
                showDetail(id);
            } else {
                showHome();
            }
        }
        
        handleRouting();
        window.addEventListener('popstate', handleRouting);
    </script>
