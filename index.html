<!DOCTYPE html>
<html>
<head>
    <title>ScriptHub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .btn {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
        }
        .script-card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .hidden {
            display: none;
        }
        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 ScriptHub</h1>
        <button class="btn" onclick="showPage('home')">Home</button>
        <button class="btn" onclick="showPage('upload')">Upload Script</button>
    </div>

    <!-- Home Page -->
    <div id="homePage">
        <div id="scriptsList">Loading scripts...</div>
    </div>

    <!-- Upload Page -->
    <div id="uploadPage" class="hidden">
        <h2>Upload Your Script</h2>
        <input type="text" id="title" placeholder="Script Title">
        <input type="text" id="author" placeholder="Your Name">
        <textarea id="description" rows="3" placeholder="Description"></textarea>
        <textarea id="code" rows="10" placeholder="Paste your Lua code here"></textarea>
        <button class="btn" onclick="uploadScript()">Upload</button>
        <div id="uploadResult"></div>
    </div>

    <!-- Detail Page -->
    <div id="detailPage" class="hidden">
        <div id="scriptDetail"></div>
        <button class="btn" onclick="showPage('home')">Back</button>
    </div>

    <script>
        const API_URL = window.location.origin;
        
        async function loadScripts() {
            try {
                const response = await fetch(`${API_URL}/api/scripts`);
                const scripts = await response.json();
                
                if (!scripts || scripts.length === 0) {
                    document.getElementById('scriptsList').innerHTML = '<p>No scripts yet. Upload one!</p>';
                    return;
                }
                
                let html = '<h2>All Scripts</h2>';
                scripts.forEach(script => {
                    html += `
                        <div class="script-card">
                            <h3>${escapeHtml(script.title)}</h3>
                            <p>By: ${escapeHtml(script.author)} | ❤️ ${script.likes || 0}</p>
                            <p>${escapeHtml(script.description)}</p>
                            <button class="btn" onclick="viewScript('${script.id}')">View Script</button>
                            <button class="btn" onclick="likeScript('${script.id}')">Like ❤️</button>
                        </div>
                    `;
                });
                document.getElementById('scriptsList').innerHTML = html;
            } catch (error) {
                document.getElementById('scriptsList').innerHTML = `<p>Error: ${error.message}</p>`;
                console.error('Error:', error);
            }
        }
        
        async function viewScript(id) {
            try {
                const response = await fetch(`${API_URL}/api/scripts?id=${id}`);
                const script = await response.json();
                
                const html = `
                    <h2>${escapeHtml(script.title)}</h2>
                    <p><strong>Author:</strong> ${escapeHtml(script.author)}</p>
                    <p><strong>Description:</strong> ${escapeHtml(script.description)}</p>
                    <p><strong>Likes:</strong> ❤️ ${script.likes || 0}</p>
                    <h3>Code:</h3>
                    <pre><code>${escapeHtml(script.code)}</code></pre>
                    <button class="btn" onclick="copyCode()">Copy Code</button>
                `;
                document.getElementById('scriptDetail').innerHTML = html;
                showPage('detail');
            } catch (error) {
                alert('Error loading script');
            }
        }
        
        async function uploadScript() {
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const description = document.getElementById('description').value;
            const code = document.getElementById('code').value;
            
            if (!title || !author || !code) {
                alert('Please fill in title, author, and code');
                return;
            }
            
            const script = { title, author, description, code };
            
            try {
                const response = await fetch(`${API_URL}/api/scripts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(script)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('uploadResult').innerHTML = '<p style="color: green;">✅ Upload successful!</p>';
                    setTimeout(() => {
                        showPage('home');
                        loadScripts();
                    }, 2000);
                } else {
                    document.getElementById('uploadResult').innerHTML = `<p style="color: red;">❌ Error: ${result.error}</p>`;
                }
            } catch (error) {
                document.getElementById('uploadResult').innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        }
        
        async function likeScript(id) {
            try {
                await fetch(`${API_URL}/api/scripts?action=like&id=${id}`, { method: 'POST' });
                loadScripts(); // Refresh the list
            } catch (error) {
                console.error('Error liking:', error);
            }
        }
        
        function copyCode() {
            const code = document.querySelector('pre code');
            if (code) {
                navigator.clipboard.writeText(code.innerText);
                alert('Code copied!');
            }
        }
        
        function showPage(page) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('uploadPage').classList.add('hidden');
            document.getElementById('detailPage').classList.add('hidden');
            
            if (page === 'home') {
                document.getElementById('homePage').classList.remove('hidden');
                loadScripts();
            } else if (page === 'upload') {
                document.getElementById('uploadPage').classList.remove('hidden');
            } else if (page === 'detail') {
                document.getElementById('detailPage').classList.remove('hidden');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load scripts on start
        showPage('home');
    </script>
</body>
</html>
