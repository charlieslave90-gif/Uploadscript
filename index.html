    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 5px;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .nav-links button {
            background: none;
            border: none;
            color: var(--dark);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .three-columns {
            display: flex;
            gap: 2rem;
        }

        .left-sidebar, .right-sidebar {
            flex: 1;
            position: sticky;
            top: 100px;
        }

        .main-content {
            flex: 3;
        }

        .hero {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--gray);
            margin-bottom: 2rem;
        }

        .btn-primary {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary {
            display: inline-block;
            padding: 10px 24px;
            background: white;
            color: var(--primary);
            border-radius: 50px;
            border: 2px solid var(--primary);
            cursor: pointer;
        }

        .search-section {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-size: 1rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            background: #f1f5f9;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
        }

        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .script-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .script-card:hover {
            transform: translateY(-5px);
        }

        .script-thumbnail {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .script-type {
            display: inline-block;
            padding: 4px 12px;
            background: #e0e7ff;
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .script-card h3 {
            margin: 0.5rem 0;
        }

        .script-meta {
            color: var(--gray);
            font-size: 0.85rem;
            margin: 0.5rem 0;
        }

        .script-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }

        .like-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
        }

        .script-detail {
            background: white;
            border-radius: 30px;
            padding: 2rem;
        }

        .script-detail pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 12px;
            overflow-x: auto;
        }

        .share-box {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
            margin: 1rem 0;
        }

        .share-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
        }

        .ad-box {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .ad-label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .horizontal-ad {
            margin: 2rem 0;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 500px;
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 3000;
        }

        @media (max-width: 1024px) {
            .three-columns {
                flex-direction: column;
            }
            .left-sidebar, .right-sidebar {
                position: static;
                display: grid;
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            .scripts-grid {
                grid-template-columns: 1fr;
            }
            .left-sidebar, .right-sidebar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <div id="linkModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ External Link</h3>
            <p>You are about to leave ScriptHub.</p>
            <p id="externalLinkUrl"></p>
            <div style="display:flex; gap:1rem; margin-top:1rem;">
                <button onclick="closeModal()" class="btn-secondary">Cancel</button>
                <button onclick="visitLink()" class="btn-primary">Continue →</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let currentScripts = [];
        let currentFilter = 'all';
        let likedScripts = JSON.parse(localStorage.getItem('likedScripts') || '{}');
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#dc2626' : '#10b981';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function copyShareLink(scriptId) {
            const shareUrl = `${window.location.origin}/?id=${scriptId}`;
            navigator.clipboard.writeText(shareUrl);
            showToast('🔗 Share link copied!');
        }
        
        function showHome() {
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('detailPage').classList.add('hidden');
            window.history.pushState({}, '', '/');
            loadScripts();
        }
        
        function showDetail(id) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('detailPage').classList.remove('hidden');
            window.history.pushState({}, '', `/?id=${id}`);
            loadScriptDetail(id);
        }
        
        async function loadScripts() {
            try {
                const response = await fetch(`${API_URL}/api/scripts`);
                currentScripts = await response.json();
                applyFiltersAndSearch();
            } catch (error) {
                document.getElementById('scriptsGrid').innerHTML = '<div class="loading">Error loading scripts</div>';
            }
        }
        
        function applyFiltersAndSearch() {
            let filtered = [...currentScripts];
            
            if (currentFilter === 'code') filtered = filtered.filter(s => s.type === 'code');
            else if (currentFilter === 'link') filtered = filtered.filter(s => s.type === 'link');
            else if (currentFilter === 'popular') filtered.sort((a, b) => (b.likes || 0) - (a.likes || 0));
            else if (currentFilter === 'recent') filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            if (searchTerm) {
                filtered = filtered.filter(s => 
                    s.title.toLowerCase().includes(searchTerm) ||
                    s.author.toLowerCase().includes(searchTerm) ||
                    s.description.toLowerCase().includes(searchTerm)
                );
            }
            
            displayScripts(filtered);
        }
        
        function displayScripts(scripts) {
            const grid = document.getElementById('scriptsGrid');
            if (!scripts || scripts.length === 0) {
                grid.innerHTML = '<div class="loading">No scripts found</div>';
                return;
            }
            
            grid.innerHTML = scripts.map(script => {
                const hasLiked = likedScripts[script.id];
                return `
                    <div class="script-card" onclick="showDetail('${script.id}')">
                        ${script.thumbnail ? `<img src="${script.thumbnail}" class="script-thumbnail">` : ''}
                        <span class="script-type">${script.type === 'code' ? '💻 Lua Script' : '🔗 External Link'}</span>
                        <h3>${escapeHtml(script.title)}</h3>
                        <div class="script-meta">
                            👤 ${escapeHtml(script.author)} • 📅 ${new Date(script.createdAt).toLocaleDateString()}
                            ${script.verified ? ' ✓ Verified' : ''}
                        </div>
                        <div class="script-description">${escapeHtml(script.description.substring(0, 120))}...</div>
                        <div class="script-footer">
                            <button onclick="event.stopPropagation(); likeScript('${script.id}')" class="like-btn" ${hasLiked ? 'disabled' : ''}>
                                ${hasLiked ? '❤️' : '🤍'} ${script.likes || 0}
                            </button>
                            <button onclick="event.stopPropagation(); showDetail('${script.id}')" class="btn-secondary">View →</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function loadScriptDetail(id) {
            try {
                const response = await fetch(`${API_URL}/api/scripts?id=${id}`);
                const script = await response.json();
                
                if (script.error) {
                    document.getElementById('scriptContent').innerHTML = '<div class="loading">Script not found</div>';
                    return;
                }
                
                const hasLiked = likedScripts[script.id];
                const shareUrl = `${window.location.origin}/?id=${script.id}`;
                
                let youtubeHtml = '';
                if (script.youtubeId) {
                    youtubeHtml = `
                        <div style="position:relative; padding-bottom:56.25%; height:0; margin:1rem 0;">
                            <iframe src="https://www.youtube.com/embed/${script.youtubeId}" style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:12px;" frameborder="0" allowfullscreen></iframe>
                        </div>
                    `;
                }
                
                let contentHtml = '';
                if (script.type === 'code') {
                    contentHtml = `
                        ${youtubeHtml}
                        <h3>📝 Script Code:</h3>
                        <pre><code id="scriptCode">${escapeHtml(script.code)}</code></pre>
                        <button onclick="copyCode()" class="btn-primary" style="margin-top:1rem;">📋 Copy Code</button>
                    `;
                } else {
                    contentHtml = `
                        ${youtubeHtml}
                        <div style="text-align:center; padding:2rem; background:#f1f5f9; border-radius:20px;">
                            <button onclick="openExternalLink('${escapeHtml(script.link)}')" class="btn-primary">🔗 Open Script →</button>
                        </div>
                    `;
                }
                
                document.getElementById('scriptContent').innerHTML = `
                    <div class="script-detail">
                        <button onclick="showHome()" class="btn-secondary" style="margin-bottom:1rem;">← Back to Home</button>
                        
                        ${script.thumbnail ? `<img src="${script.thumbnail}" style="width:100%; max-height:300px; object-fit:cover; border-radius:20px; margin-bottom:1rem;">` : ''}
                        
                        <h1>${escapeHtml(script.title)}</h1>
                        <div class="script-meta">
                            👤 ${escapeHtml(script.author)} • 📅 ${new Date(script.createdAt).toLocaleDateString()}
                            ${script.verified ? ' ✓ Verified' : ''}
                        </div>
                        
                        <div class="share-box">
                            <p style="margin-bottom:0.5rem;"><strong>🔗 Share this script:</strong></p>
                            <input type="text" id="shareUrl" value="${shareUrl}" readonly onclick="this.select()">
                            <button onclick="copyShareLink('${script.id}')" class="btn-primary" style="margin-top:10px;">Copy Share Link</button>
                        </div>
                        
                        <p><strong>Description:</strong> ${escapeHtml(script.description)}</p>
                        ${contentHtml}
                        
                        <div style="margin-top:2rem; text-align:center;">
                            <button onclick="likeScript('${script.id}')" class="like-btn" style="font-size:1.2rem;" ${hasLiked ? 'disabled' : ''}>
                                ${hasLiked ? '❤️' : '🤍'} ${script.likes || 0} Likes
                            </button>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                document.getElementById('scriptContent').innerHTML = '<div class="loading">Script not found</div>';
            }
        }
        
        async function likeScript(id) {
            if (likedScripts[id]) {
                showToast('Already liked!', true);
                return;
            }
            try {
                const response = await fetch(`${API_URL}/api/scripts?action=like&id=${id}`, { method: 'POST' });
                if (response.ok) {
                    likedScripts[id] = true;
                    localStorage.setItem('likedScripts', JSON.stringify(likedScripts));
                    showToast('❤️ Liked!');
                    loadScripts();
                    const urlParams = new URLSearchParams(window.location.search);
                    const currentId = urlParams.get('id');
                    if (currentId) loadScriptDetail(currentId);
                }
            } catch (error) {
                showToast('Error', true);
            }
        }
        
        function copyCode() {
            const code = document.getElementById('scriptCode')?.innerText;
            if (code) {
                navigator.clipboard.writeText(code);
                showToast('✅ Code copied!');
            }
        }
        
        let currentLink = '';
        function openExternalLink(url) {
            currentLink = url;
            document.getElementById('externalLinkUrl').innerText = url;
            document.getElementById('linkModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('linkModal').style.display = 'none';
        }
        
        function visitLink() {
            window.open(currentLink, '_blank');
            closeModal();
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                applyFiltersAndSearch();
            });
        });
        
        document.getElementById('searchInput')?.addEventListener('input', () => applyFiltersAndSearch());
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Handle URL with ?id=xxx
        function handleRouting() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (id) {
                showDetail(id);
            } else {
                showHome();
            }
        }
        
        handleRouting();
        
        window.addEventListener('popstate', () => {
            handleRouting();
        });
    </script>
