<body>

<div class="main-container">
    <!-- Ad placement area (scripts are already loaded above) -->
    
    <div class="card">
        <h1>🔑 KEY SYSTEM</h1>
        <div class="subhead">Complete all steps to unlock your key</div>
        
        <!-- Progress -->
        <div class="progress-container">
            <div class="progress-steps">
                <div class="step" id="step1">
                    <div class="step-circle" id="step1Circle">1</div>
                    <div class="step-label" id="step1Label">Step 1</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-circle" id="step2Circle">2</div>
                    <div class="step-label" id="step2Label">Step 2</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-circle" id="step3Circle">3</div>
                    <div class="step-label" id="step3Label">Step 3</div>
                </div>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <!-- Dynamic Task Area -->
        <div id="taskArea"></div>
        
        <!-- Key Display -->
        <div id="keyDisplay" class="key-display">
            <div class="key-label">🎉 YOUR UNLOCK KEY 🎉</div>
            <div class="key-code" id="keyCode">Loading...</div>
            <button class="copy-btn" id="copyBtn">📋 COPY KEY</button>
            <div id="copySuccess" class="copy-success">✅ Copied to clipboard!</div>
        </div>
        
        <div class="info-box">
            ⚡ Click Start on each step and wait 25 seconds
        </div>
    </div>
    
    <div class="footer">
        Complete all 3 steps • 25 seconds each
    </div>
</div>

<script>
    // ===== YOUR KEYS =====
    const VALID_KEYS = [
        "gay_XgVsJAD70297UNjn",
        "Site_nPCkS6asaeU0Q5qG",
        "Api_JENdv4Mincr2R6Co",
        "Goldy_GgFDwIh27Rn1Z9zE",
        "Roblox_4ncBt7JvMcn3Ttvc"
    ];
    
    // Steps configuration
    const steps = [
        { id: 1, name: "Verification", completed: false, timerActive: false },
        { id: 2, name: "Authentication", completed: false, timerActive: false },
        { id: 3, name: "Finalization", completed: false, timerActive: false }
    ];
    
    let currentStep = 1;
    let currentKey = null;
    let timerInterval = null;
    
    function updateProgress() {
        const completedCount = steps.filter(s => s.completed).length;
        const percentage = (completedCount / steps.length) * 100;
        const progressFill = document.getElementById('progressFill');
        if (progressFill) progressFill.style.width = percentage + '%';
        
        for (let i = 1; i <= 3; i++) {
            const circle = document.getElementById(`step${i}Circle`);
            const label = document.getElementById(`step${i}Label`);
            const step = steps[i-1];
            
            if (circle) {
                if (step.completed) {
                    circle.classList.add('completed');
                    circle.innerHTML = '✓';
                } else if (i === currentStep) {
                    circle.classList.add('active');
                    circle.classList.remove('completed');
                    circle.innerHTML = i;
                } else {
                    circle.classList.remove('completed', 'active');
                    circle.innerHTML = i;
                }
            }
            if (label) {
                if (step.completed) {
                    label.classList.add('completed');
                } else if (i === currentStep) {
                    label.classList.add('active');
                } else {
                    label.classList.remove('completed', 'active');
                }
            }
        }
        
        if (completedCount === steps.length) {
            revealKey();
        } else {
            renderStep();
        }
    }
    
    function stopCurrentTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }
    
    function startTimer(stepId, waitTime) {
        const step = steps[stepId - 1];
        if (step.completed || step.timerActive) return;
        
        stopCurrentTimer();
        step.timerActive = true;
        let timeLeft = waitTime;
        
        const timerElement = document.getElementById('timerDisplay');
        const btnElement = document.getElementById('startBtn');
        
        if (timerElement) timerElement.innerText = `${timeLeft}s`;
        if (btnElement) {
            btnElement.disabled = true;
            btnElement.innerText = `Wait ${timeLeft}s...`;
        }
        
        timerInterval = setInterval(() => {
            timeLeft--;
            if (timerElement) timerElement.innerText = `${timeLeft}s`;
            if (btnElement) btnElement.innerText = `Wait ${timeLeft}s...`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                step.completed = true;
                step.timerActive = false;
                currentStep++;
                updateProgress();
            }
        }, 1000);
    }
    
    function handleStart() {
        if (currentStep > steps.length) return;
        const step = steps[currentStep - 1];
        if (step.completed) return;
        if (step.timerActive) return;
        
        startTimer(currentStep, 25);
    }
    
    function renderStep() {
        const taskArea = document.getElementById('taskArea');
        
        if (currentStep > steps.length) {
            taskArea.innerHTML = `
                <div class="task-card">
                    <div class="complete-badge">✓ All Steps Complete ✓</div>
                    <div style="color:#94a3b8; margin-top:15px;">Your key is ready below</div>
                </div>
            `;
            return;
        }
        
        const step = steps[currentStep - 1];
        const isWaiting = step.timerActive;
        const isCompleted = step.completed;
        
        let icons = ['🔒', '🛡️', '🎁'];
        let titles = ['Verification', 'Authentication', 'Final Access'];
        let descs = [
            'Click Start to begin verification. Wait 25 seconds.',
            'Second step authentication. Wait 25 seconds.',
            'Final step. Wait 25 seconds to get your key.'
        ];
        
        let content = `
            <div class="task-card">
                <div class="task-icon">${icons[currentStep-1]}</div>
                <div class="task-title">Step ${currentStep}: ${titles[currentStep-1]}</div>
                <div class="task-desc">${descs[currentStep-1]}</div>
        `;
        
        if (isWaiting) {
            content += `<div class="timer-display" id="timerDisplay">25s</div>`;
            content += `<button class="start-btn" id="startBtn" disabled>Wait 25s...</button>`;
            content += `<div class="status-text">⏳ Please wait...</div>`;
        } else if (isCompleted) {
            content += `<div class="complete-badge">✓ Complete</div>`;
            content += `<div class="status-text">Step completed!</div>`;
        } else {
            content += `<button class="start-btn" id="startBtn">Start</button>`;
            content += `<div class="status-text">👉 Click Start to begin (25 second wait)</div>`;
        }
        
        content += `</div>`;
        taskArea.innerHTML = content;
        
        const btn = document.getElementById('startBtn');
        if (btn && !isWaiting && !isCompleted) {
            btn.addEventListener('click', handleStart);
        }
    }
    
    function getRandomKey() {
        const randomIndex = Math.floor(Math.random() * VALID_KEYS.length);
        return VALID_KEYS[randomIndex];
    }
    
    async function revealKey() {
        if (currentKey) return;
        
        stopCurrentTimer();
        currentKey = getRandomKey();
        const keyCodeElem = document.getElementById('keyCode');
        if (keyCodeElem) keyCodeElem.innerText = currentKey;
        const keyDisplay = document.getElementById('keyDisplay');
        if (keyDisplay) {
            keyDisplay.style.display = 'block';
            keyDisplay.style.animation = 'pulse 0.5s ease-in-out';
        }
    }
    
    // Copy button
    const copyBtn = document.getElementById('copyBtn');
    if (copyBtn) {
        copyBtn.addEventListener('click', function() {
            if (currentKey) {
                navigator.clipboard.writeText(currentKey).then(() => {
                    const successDiv = document.getElementById('copySuccess');
                    if (successDiv) {
                        successDiv.style.display = 'block';
                        setTimeout(() => successDiv.style.display = 'none', 2000);
                    }
                }).catch(() => {
                    alert("Copy manually: " + currentKey);
                });
            }
        });
    }
    
    function init() {
        steps.forEach(s => { s.completed = false; s.timerActive = false; });
        currentStep = 1;
        currentKey = null;
        if (timerInterval) clearInterval(timerInterval);
        const keyDisplay = document.getElementById('keyDisplay');
        if (keyDisplay) keyDisplay.style.display = 'none';
        updateProgress();
    }
    
    init();
</script>
