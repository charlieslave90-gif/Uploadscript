<script>
    // Single task configuration - 20 seconds
    const task = {
        id: 1,
        name: "Verify Human",
        url: "https://theoreticalassertshame.com/cf2pmntd4?key=58419b4b69181e2cbecd321ed95c7cb8",
        timer: 20,
        completed: false,
        timerActive: false,
        timeLeft: 20
    };
    
    // Valid keys (same as backend)
    const VALID_KEYS = [
        "Free_XJQPWKDMVRTYNAZBLC",
        "Free_MHATQZPLXCVBNERKJD",
        "Free_UYTRQPLKJHGFDSAZXC",
        "Free_NVBXQWERTYPLMKJHGF",
        "Free_ZXCVBNMASDFGHJKLQP",
        "Free_QWPLMNZXCVAKJHGFDT"
    ];
    
    let currentKey = null;
    let taskInterval = null;
    
    function updateProgress() {
        const percentage = task.completed ? 100 : 0;
        document.getElementById('progressFill').style.width = percentage + '%';
        
        if (task.completed) {
            revealKey();
        }
    }
    
    function openAdLink() {
        window.open(task.url, '_blank');
        startTaskTimer();
    }
    
    function startTaskTimer() {
        if (task.completed || task.timerActive) return;
        
        task.timerActive = true;
        task.timeLeft = task.timer;
        
        const timerElement = document.getElementById('taskTimer');
        const buttonElement = document.getElementById('taskBtn');
        
        buttonElement.disabled = true;
        buttonElement.textContent = `Wait ${task.timeLeft}s`;
        
        taskInterval = setInterval(() => {
            task.timeLeft--;
            if (timerElement) timerElement.textContent = `${task.timeLeft}s`;
            if (buttonElement) buttonElement.textContent = `Wait ${task.timeLeft}s`;
            
            if (task.timeLeft <= 0) {
                clearInterval(taskInterval);
                task.completed = true;
                task.timerActive = false;
                
                if (timerElement) timerElement.textContent = '✓ Done';
                buttonElement.textContent = '✓ Completed';
                buttonElement.classList.add('completed');
                buttonElement.disabled = true;
                
                const statusElement = document.getElementById('taskStatus');
                if (statusElement) statusElement.textContent = 'Completed!';
                
                updateProgress();
            }
        }, 1000);
    }
    
    function renderTask() {
        const container = document.getElementById('taskContainer');
        container.innerHTML = '';
        
        const taskDiv = document.createElement('div');
        taskDiv.className = `task-card ${task.completed ? 'completed' : ''}`;
        
        taskDiv.innerHTML = `
            <div class="task-name">${task.name}</div>
            <div class="task-status" id="taskStatus">
                ${task.completed ? '✓ Completed!' : 'Click "Start Task" to begin'}
            </div>
            ${!task.completed ? `<div class="task-timer" id="taskTimer">${task.timerActive ? `${task.timeLeft}s` : '0s'}</div>` : ''}
            <button class="task-btn" id="taskBtn" ${task.completed ? 'disabled' : ''}>
                ${task.completed ? '✓ Completed' : 'Start Task'}
            </button>
        `;
        container.appendChild(taskDiv);
        
        if (!task.completed) {
            const btn = document.getElementById('taskBtn');
            if (btn) {
                btn.addEventListener('click', openAdLink);
            }
        }
    }
    
    async function fetchRandomKey() {
        try {
            const response = await fetch('/api/keys');
            if (response.ok) {
                const data = await response.json();
                if (data.success && data.keys && data.keys.length > 0) {
                    const randomIndex = Math.floor(Math.random() * data.keys.length);
                    return data.keys[randomIndex].key;
                }
            }
        } catch (error) {
            console.warn('API fetch failed, using fallback list');
        }
        const randomIndex = Math.floor(Math.random() * VALID_KEYS.length);
        return VALID_KEYS[randomIndex];
    }
    
    async function revealKey() {
        if (currentKey) return;
        currentKey = await fetchRandomKey();
        document.getElementById('keyCode').innerText = currentKey;
        document.getElementById('keyDisplay').style.display = 'block';
        showToast('✅ Task completed! Your key is ready.');
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.right = '20px';
        toast.style.background = '#1e2f3f';
        toast.style.color = 'white';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '40px';
        toast.style.zIndex = '1000';
        toast.style.fontSize = '0.85rem';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    document.getElementById('copyBtn')?.addEventListener('click', function() {
        if (currentKey) {
            navigator.clipboard.writeText(currentKey).then(() => {
                document.getElementById('copySuccess').style.display = 'block';
                setTimeout(() => document.getElementById('copySuccess').style.display = 'none', 2000);
            });
        } else {
            showToast('❌ Key not ready yet. Complete the task first.');
        }
    });
    
    renderTask();
    updateProgress();
</script>
