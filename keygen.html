<script>
    const LINKVERTISE_URL = "https://omg10.com/4/11001405";
    const LOOTLABS_STEP_1 = "https://omg10.com/4/11001403";
    const LOOTLABS_STEP_2 = "https://omg10.com/4/11001406";
    const LOOTLABS_BASE_URL = "https://loot-link.com/s?3KNAXLNm";
    
    const TARGET_FINAL_URL = "https://rblxscripts2.vercel.app/getkey";

    let currentStep = parseInt(localStorage.getItem("secure_step")) || 1;
    let selectedProvider = localStorage.getItem("selected_provider") || "lootlabs";
    
    let isCaptchaDone = false;
    let countdownActive = false;
    let timerInterval = null;

    // ANTI-BYPASS SECURITY
    const clickVerified = localStorage.getItem("step_click_verified");
    if (currentStep > 1 && clickVerified !== "true") {
        localStorage.setItem("secure_step", 1);
        currentStep = 1;
    }
    localStorage.removeItem("step_click_verified");

    function changeProvider() {
        if (currentStep === 1) {
            selectedProvider = document.getElementById("provider").value;
            localStorage.setItem("selected_provider", selectedProvider);
            renderUI();
        }
    }

    function captchaValidated(response) {
        if(response.length > 0 && !countdownActive) {
            isCaptchaDone = true;
            const actionBtn = document.getElementById("primary-link");
            actionBtn.classList.remove("locked");
            
            if (selectedProvider === "linkvertise") {
                actionBtn.innerText = "Go to Linkvertise";
            } else {
                actionBtn.innerText = `Go to Checkpoint ${currentStep}`;
            }
            document.getElementById("captcha-refresh").style.display = "none";
        }
    }

    function captchaExpired() {
        isCaptchaDone = false;
        if (!countdownActive) {
            document.getElementById("primary-link").classList.add("locked");
            document.getElementById("primary-link").innerText = "Verify Captcha First";
            document.getElementById("captcha-refresh").style.display = "block";
        }
    }

    function forceCaptchaReset() {
        if (typeof grecaptcha !== 'undefined' && grecaptcha.reset) {
            grecaptcha.reset();
            document.getElementById("captcha-refresh").style.display = "none";
        }
    }

    function renderUI() {
        const titleText = document.getElementById("title-text");
        const statusText = document.getElementById("status-text");
        const actionBtn = document.getElementById("primary-link");
        const stepBadge = document.getElementById("step-badge");
        const providerSelector = document.getElementById("selector-wrapper");

        document.getElementById("provider").value = selectedProvider;
        isCaptchaDone = false;
        countdownActive = false;
        if (timerInterval) clearInterval(timerInterval);
        forceCaptchaReset();

        if (currentStep > 1) {
            providerSelector.style.display = "none";
        } else {
            providerSelector.style.display = "block";
        }

        if (selectedProvider === "linkvertise") {
            if (currentStep === 1) {
                titleText.innerText = "Checkpoint 1 (Linkvertise)";
                statusText.innerText = "Complete the captcha verification below to route your key via Linkvertise.";
                actionBtn.innerText = "Verify Captcha First";
                stepBadge.innerText = "Step 1 of 1";
                actionBtn.classList.add("locked");
            } else {
                showAccessGranted(titleText, statusText, actionBtn, stepBadge);
            }
        } else {
            if (currentStep === 1) {
                titleText.innerText = "Checkpoint 1 (LootLabs)";
                statusText.innerText = "Check the box below to start your LootLabs verification routing.";
                actionBtn.innerText = "Verify Captcha First";
                stepBadge.innerText = "Step 1 of 3";
                actionBtn.classList.add("locked");
            } else if (currentStep === 2) {
                titleText.innerText = "Checkpoint 2 (LootLabs)";
                statusText.innerText = "Pass verification step 2 to continue forwarding safely.";
                actionBtn.innerText = "Verify Captcha First";
                stepBadge.innerText = "Step 2 of 3";
                actionBtn.classList.add("locked");
            } else if (currentStep === 3) {
                titleText.innerText = "Checkpoint 3 (LootLabs)";
                statusText.innerText = "Final Step! Solve the puzzle once more to access your key target link.";
                actionBtn.innerText = "Verify Captcha First";
                stepBadge.innerText = "Step 3 of 3";
                actionBtn.classList.add("locked");
            } else {
                showAccessGranted(titleText, statusText, actionBtn, stepBadge);
            }
        }
    }

    function showAccessGranted(title, status, btn, badge) {
        title.innerText = "Access Granted";
        status.innerText = "Verification complete! Click below to retrieve your permanent lifetime key.";
        btn.innerText = "Claim Lifetime Key";
        badge.innerText = "Verification Complete";
        btn.style.backgroundColor = "#ffeb3b";
        btn.classList.remove("locked");
        document.getElementById('captcha-box').style.display = 'none';
    }

    function handleNavigation(event) {
        event.preventDefault();

        if (!isCaptchaDone || countdownActive) {
            return false;
        }

        // If it's the final key retrieval button, bypass countdown entirely
        const maxAllowedSteps = selectedProvider === "linkvertise" ? 2 : 4;
        if (currentStep >= maxAllowedSteps) {
            clearAndRedirect();
            return;
        }

        // Trigger 13s countdown on the button right here right now
        runInlineCountdown(13);
    }

    function runInlineCountdown(seconds) {
        countdownActive = true;
        const actionBtn = document.getElementById("primary-link");
        const captchaBox = document.getElementById("captcha-box");

        actionBtn.classList.add("locked");
        captchaBox.style.opacity = "0.2";
        captchaBox.style.pointerEvents = "none";
        
        actionBtn.innerText = `Redirecting in ${seconds}s...`;

        timerInterval = setInterval(() => {
            seconds--;
            if (seconds > 0) {
                actionBtn.innerText = `Redirecting in ${seconds}s...`;
            } else {
                clearInterval(timerInterval);
                executeRedirect();
            }
        }, 1000);
    }

    function executeRedirect() {
        localStorage.setItem("step_click_verified", "true");

        if (selectedProvider === "linkvertise") {
            localStorage.setItem("secure_step", 2); 
            window.location.href = LINKVERTISE_URL;
        } else {
            if (currentStep === 1) {
                localStorage.setItem("secure_step", 2);
                window.location.href = LOOTLABS_STEP_1; 
            } else if (currentStep === 2) {
                localStorage.setItem("secure_step", 3);
                window.location.href = LOOTLABS_STEP_2;
            } else if (currentStep === 3) {
                localStorage.setItem("secure_step", 4);
                window.location.href = LOOTLABS_BASE_URL;
            }
        }
    }

    function clearAndRedirect() {
        localStorage.removeItem("secure_step");
        localStorage.removeItem("selected_provider");
        window.location.href = TARGET_FINAL_URL;
    }

    window.onload = renderUI;
</script>
