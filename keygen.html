<script>
    const USER_ID = "4752730";
    const CUTY_URL = "https://cuty.io/1KbMLHzwk";
    const TARGET_FINAL_URL = "https://rblxscripts2.vercel.app/getkey";

    let currentStep = parseInt(localStorage.getItem("secure_step")) || 1;
    let isCaptchaDone = false;

    function captchaValidated(response) {
        if(response.length > 0) {
            isCaptchaDone = true;
            document.getElementById("primary-link").classList.remove("locked");
        }
    }

    function captchaExpired() {
        isCaptchaDone = false;
        if (currentStep < 3) {
            document.getElementById("primary-link").classList.add("locked");
        }
    }

    function buildLinkvertiseUrl() {
        const baseDestination = window.location.origin + window.location.pathname;
        const cleanDestination = btoa(baseDestination);
        return "https://linkvertise.com/" + USER_ID + "/" + Math.random().toString(36).substring(7) + "/dynamic?r=" + cleanDestination;
    }

    function renderUI() {
        const titleText = document.getElementById("title-text");
        const statusText = document.getElementById("status-text");
        const actionBtn = document.getElementById("primary-link");
        const stepBadge = document.getElementById("step-badge");

        // Force reset the validation engine state on interface initialization
        isCaptchaDone = false;
        if (typeof grecaptcha !== 'undefined' && grecaptcha.reset) {
            grecaptcha.reset();
        }

        if (currentStep === 1) {
            titleText.innerText = "Checkpoint 1";
            statusText.innerText = "Check the verification box below to initialize Checkpoint 1.";
            actionBtn.innerText = "Go to Checkpoint 1";
            stepBadge.innerText = "Step 1 of 2";
            actionBtn.classList.add("locked");
        } else if (currentStep === 2) {
            titleText.innerText = "Checkpoint 2";
            statusText.innerText = "Final Step! Re-verify the captcha puzzle below to unlock your target destination link.";
            actionBtn.innerText = "Go to Checkpoint 2";
            stepBadge.innerText = "Step 2 of 2";
            actionBtn.classList.add("locked");
        } else {
            titleText.innerText = "Access Granted";
            statusText.innerText = "Verification complete! Click below to retrieve your permanent lifetime key.";
            actionBtn.innerText = "Claim Lifetime Key";
            stepBadge.innerText = "Verification Complete";
            actionBtn.style.backgroundColor = "#ffeb3b";
            actionBtn.classList.remove("locked");
            document.querySelector('.captcha-container').style.display = 'none';
        }
    }

    function handleNavigation(event) {
        event.preventDefault();

        // Strict bypass fallback validation check
        if ((currentStep === 1 || currentStep === 2) && !isCaptchaDone) {
            return false;
        }

        if (currentStep === 1) {
            localStorage.setItem("secure_step", 2);
            window.location.href = buildLinkvertiseUrl();
        } else if (currentStep === 2) {
            localStorage.setItem("secure_step", 3);
            window.location.href = CUTY_URL;
        } else {
            localStorage.removeItem("secure_step");
            window.location.href = TARGET_FINAL_URL;
        }
    }

    window.onload = renderUI;
</script>
