<script>
    // Configuration Target Environment Elements
    const USER_ID = "4752730";
    const LOOTLABS_BASE_URL = "https://loot-link.com/s?3KNAXLNm";
    
    // Task Links
    const TASK_1_URL = "https://omg10.com/4/11001406";
    const TASK_2_URL = "https://omg10.com/4/11001405";

    // Application state tracking flags
    let activeScreen = "offer"; // offer -> gateway
    let isCaptchaDone = false;
    let selectedProvider = "lootlabs";
    
    // Task Sequence States: 'not_started', 'task1_cooldown', 'task1_done', 'task2_cooldown', 'ready'
    let taskState = "not_started"; 
    let countdownTimer = null;
    let currentSeconds = 0;

    // Shared internal SVG asset symbols
    const svgCheck = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
    const svgKey = `<svg viewBox="0 0 24 24"><path d="M12.65 11.65c.35-.35.35-.92 0-1.27l-1.01-1.01c-.35-.35-.92-.35-1.27 0l-.66.66-1.57-1.57c1.32-1.74 1.13-4.22-.57-5.74-1.92-1.73-4.91-1.57-6.63.36-1.72 1.93-1.56 4.92.36 6.64 1.52 1.36 3.71 1.46 5.33.42l1.66 1.66-.66.66c-.35.35-.35.92 0 1.27l1.01 1.01c.35.35.92.35 1.27 0l.66-.66 1.57 1.57c-.12.12-.21.27-.27.43l-.93 2.79c-.11.33.02.7.32.9l1.42.95c.34.23.79.16 1.06-.16l1.41-1.71 1.71 1.41c.32.26.77.2 1.02-.15l1.35-1.9c.2-.28.19-.66-.03-.92l-1.63-1.94.66-.66zM6.5 6C5.67 6 5 5.33 5 4.5S5.67 3 6.5 3 8 3.67 8 4.5 7.33 6 6.5 6z"/></svg>`;

    function renderScreen() {
        const card = document.getElementById("interactive-card");
        
        if (activeScreen === "offer") {
            card.innerHTML = `
                <div class="key-icon-circle">${svgKey}</div>
                <h1 class="offer-title">Permanent Key</h1>
                <p class="offer-subtext">Pass a quick secure verification to fetch your license access hook.</p>
                <div class="price-badge">$0</div>
                
                <div class="features-list">
                    <div class="feature-item">${svgCheck} <span>Permanent lifetime access per key</span></div>
                    <div class="feature-item">${svgCheck} <span>Unlimited regenerations</span></div>
                    <div class="feature-item">${svgCheck} <span>Access to all free scripts</span></div>
                    <div class="feature-item">${svgCheck} <span>Device-specific HWID binding</span></div>
                    <div class="feature-item">${svgCheck} <span>Quick 1-step direct routing</span></div>
                </div>

                <div class="captcha-container">
                    <div class="g-recaptcha" data-sitekey="6Lcjb_gsAAAAAAWx5z-RYcQZtO5TR-0LJggnzL62" data-theme="dark" data-callback="captchaSolved" data-expired-callback="captchaExpired"></div>
                </div>

                <button id="action-btn" class="btn locked" onclick="advanceToGateway()">
                    ${svgKey} Verify Captcha First
                </button>
            `;
            grecaptcha.render(card.querySelector('.g-recaptcha'));
            
        } else if (activeScreen === "gateway") {
            card.innerHTML = `
                <h1 class="offer-title" style="color:#39da8a">Select Gateway</h1>
                <p class="offer-subtext">Choose your preferred provider link module configuration below.</p>
                
                <div class="gateway-selector">
                    <label for="provider">Select Ad Provider:</label>
                    <select id="provider" class="gateway-select" onchange="selectedProvider = this.value; updateGatewayButtonText();" ${taskState !== 'not_started' && taskState !== 'ready' ? 'disabled' : ''}>
                        <option value="lootlabs" ${selectedProvider === 'lootlabs' ? 'selected' : ''}>LootLabs (1 Checkpoint)</option>
                        <option value="linkvertise" ${selectedProvider === 'linkvertise' ? 'selected' : ''}>Linkvertise (1 Checkpoint)</option>
                    </select>
                </div>

                <div class="captcha-container" id="gateway-captcha-box">
                    <div class="g-recaptcha" data-sitekey="6Lcjb_gsAAAAAAWx5z-RYcQZtO5TR-0LJggnzL62" data-theme="dark" data-callback="captchaSolved" data-expired-callback="captchaExpired"></div>
                </div>

                <button id="action-btn" class="btn btn-success locked" onclick="handleGatewayAction()">
                    Verify Captcha First
                </button>
            `;
            
            if (taskState === "not_started") {
                grecaptcha.render(card.querySelector('.g-recaptcha'));
            } else {
                document.getElementById("gateway-captcha-box").style.display = "none";
                updateGatewayButtonText();
            }
        }
    }

    function updateGatewayButtonText() {
        const btn = document.getElementById("action-btn");
        if (!btn) return;

        if (activeScreen === "offer") {
            if (isCaptchaDone) {
                btn.classList.remove("locked");
                btn.innerHTML = `${svgKey} Get Free Key Now`;
            }
            return;
        }

        btn.classList.remove("locked");
        
        if (taskState === "not_started") {
            if (isCaptchaDone) {
                btn.innerHTML = "Complete Task 1 (10s)";
            } else {
                btn.classList.add("locked");
                btn.innerHTML = "Verify Captcha First";
            }
        } else if (taskState === "task1_cooldown") {
            btn.classList.add("locked");
            btn.innerHTML = `Please wait... (${currentSeconds}s)`;
        } else if (taskState === "task1_done") {
            btn.innerHTML = "Complete Task 2 (6s)";
        } else if (taskState === "task2_cooldown") {
            btn.classList.add("locked");
            btn.innerHTML = `Please wait... (${currentSeconds}s)`;
        } else if (taskState === "ready") {
            btn.innerHTML = selectedProvider === "linkvertise" ? "Launch Linkvertise" : "Launch LootLabs";
        }
    }

    function captchaSolved(token) {
        if (token.length > 0) {
            isCaptchaDone = true;
            updateGatewayButtonText();
        }
    }

    function captchaExpired() {
        isCaptchaDone = false;
        const btn = document.getElementById("action-btn");
        if (btn) {
            btn.classList.add("locked");
            btn.innerHTML = activeScreen === "offer" ? `${svgKey} Verify Captcha First` : "Verify Captcha First";
        }
    }

    function advanceToGateway() {
        if (!isCaptchaDone) return;
        isCaptchaDone = false;
        activeScreen = "gateway";
        renderScreen();
    }

    function handleGatewayAction() {
        const btn = document.getElementById("action-btn");
        if (btn.classList.contains("locked")) return;

        if (taskState === "not_started") {
            window.open(TASK_1_URL, '_blank');
            document.getElementById("gateway-captcha-box").style.display = "none";
            taskState = "task1_cooldown";
            currentSeconds = 10;
            updateGatewayButtonText();
            
            countdownTimer = setInterval(() => {
                currentSeconds--;
                if (currentSeconds <= 0) {
                    clearInterval(countdownTimer);
                    taskState = "task1_done";
                }
                updateGatewayButtonText();
            }, 1000);

        } else if (taskState === "task1_done") {
            window.open(TASK_2_URL, '_blank');
            taskState = "task2_cooldown";
            currentSeconds = 6;
            updateGatewayButtonText();

            countdownTimer = setInterval(() => {
                currentSeconds--;
                if (currentSeconds <= 0) {
                    clearInterval(countdownTimer);
                    taskState = "ready";
                }
                updateGatewayButtonText();
            }, 1000);

        } else if (taskState === "ready") {
            executeRedirection();
        }
    }

    function buildLinkvertiseUrl() {
        const baseDestination = window.location.origin + window.location.pathname;
        const cleanDestination = btoa(baseDestination);
        return "https://linkvertise.com/" + USER_ID + "/" + Math.random().toString(36).substring(7) + "/dynamic?r=" + cleanDestination;
    }

    function executeRedirection() {
        let targetUrl = selectedProvider === "linkvertise" ? buildLinkvertiseUrl() : LOOTLABS_BASE_URL;
        window.open(targetUrl, '_blank');
    }

    window.onload = renderScreen;
</script>
