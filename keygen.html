<script>
    const USER_ID = "4752730";
    const TARGET_FINAL_URL = "https://rblxscripts2.vercel.app/getkey";

    // Persistent storage state to track current verification step
    let currentStep = parseInt(localStorage.getItem("user_checkpoint")) || 1;

    function buildLinkvertiseUrl(stepName) {
        // Set a session validation trigger right before leaving the page
        sessionStorage.setItem("pending_verification", stepName);
        
        const baseDestination = window.location.origin + window.location.pathname + "?verify=" + stepName;
        const cleanDestination = btoa(baseDestination);
        
        return "https://linkvertise.com/" + USER_ID + "/" + Math.random().toString(36).substring(7) + "/dynamic?r=" + cleanDestination;
    }

    function checkSystemState() {
        // Check if the user is returning from a step redirect
        const pendingStep = sessionStorage.getItem("pending_verification");
        const urlParams = new URLSearchParams(window.location.search);
        const hasUrlVerify = urlParams.has("verify") || urlParams.has("status");

        if (pendingStep || hasUrlVerify) {
            if ((pendingStep === "checkpoint1" || urlParams.get("status") === "checkpoint1") && currentStep === 1) {
                currentStep = 2;
                localStorage.setItem("user_checkpoint", 2);
            } else if ((pendingStep === "checkpoint2" || urlParams.get("status") === "checkpoint2") && currentStep === 2) {
                currentStep = 3;
                localStorage.setItem("user_checkpoint", 3);
            }
            // Clear verification tokens so refresh doesn't trigger loops
            sessionStorage.removeItem("pending_verification");
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        const titleText = document.getElementById("title-text");
        const statusText = document.getElementById("status-text");
        const actionBtn = document.getElementById("primary-link");
        const stepBadge = document.getElementById("step-badge");

        if (currentStep === 1) {
            titleText.innerText = "Checkpoint 1";
            statusText.innerText = "Complete Step 1 to begin initializing your Lifetime Key configuration.";
            actionBtn.innerText = "Go to Checkpoint 1";
            stepBadge.innerText = "Step 1 of 2";
        } else if (currentStep === 2) {
            titleText.innerText = "Checkpoint 2";
            statusText.innerText = "Final Step! Complete this link to instantly claim your Lifetime Key.";
            actionBtn.innerText = "Go to Checkpoint 2";
            stepBadge.innerText = "Step 2 of 2";
        } else {
            titleText.innerText = "Access Granted";
            statusText.innerText = "Success! Click below to claim your permanent Lifetime Key.";
            actionBtn.innerText = "Claim Lifetime Key";
            stepBadge.innerText = "Verification Complete";
            actionBtn.style.backgroundColor = "#ffeb3b";
        }
    }

    function handleNavigation(event) {
        event.preventDefault();

        if (currentStep === 1) {
            window.location.href = buildLinkvertiseUrl("checkpoint1");
        } else if (currentStep === 2) {
            window.location.href = buildLinkvertiseUrl("checkpoint2");
        } else {
            localStorage.removeItem("user_checkpoint");
            window.location.href = TARGET_FINAL_URL;
        }
    }

    window.onload = checkSystemState;
</script>
