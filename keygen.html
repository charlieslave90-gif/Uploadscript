<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executor Key System</title>
    
    <!-- Linkvertise Script Integration -->
    <script src="https://publisher.linkvertise.com/cdn/linkvertise.js"></script>
    <script>
        linkvertise(4752730, {
            whitelist: [
                "https://rblxscripts2.vercel.app/",
                "https://rblxscripts2.vercel.app/getkey",
                "https://rblxscripts2.vercel.app/keygen"
            ], 
            blacklist: []
        });
    </script>

    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #00e676; }
        p { color: #aaaaaa; font-size: 14px; line-height: 1.5; }
        .btn {
            background-color: #00e676;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        .btn:hover { background-color: #00b359; transform: scale(1.02); }
        .status { margin-top: 15px; font-weight: bold; color: #ffeb3b; }
    </style>
</head>
<body>

<div class="container">
    <h1>Key Verification</h1>
    <p>Complete the checkpoints to generate your script execution key.</p>
    
    <div id="step-display">
        <p id="step-text">Loading verification status...</p>
        <button id="action-btn" class="btn" onclick="processNextStep()">Proceed to Next Step</button>
    </div>
</div>

<script>
    // Configuration Setup
    const TARGET_FINAL_URL = "https://rblxscripts2.vercel.app/getkey";
    
    // Track checkpoints using localStorage so progress saves across Linkvertise redirects
    let currentStep = parseInt(localStorage.getItem('key_step')) || 1;

    // Hardcoded Links provided by your Linkvertise Panel
    const linkvertiseLinks = {
        1: "https://link-target.net", // Replace with Linkvertise Link 1
        2: "https://link-target.net"  // Replace with Linkvertise Link 2
    };

    function updateUI() {
        const stepText = document.getElementById('step-text');
        const actionBtn = document.getElementById('action-btn');

        // Check if user is returning from a linkvertise hash redirect
        const urlParams = new URLSearchParams(window.location.search);
        const hasHash = urlParams.has('hash');

        if (hasHash && currentStep <= 2) {
            // User successfully finished a Linkvertise checkpoint
            stepText.innerText = `Checkpoint ${currentStep} verified! Ready for the next tier.`;
            actionBtn.innerText = currentStep === 2 ? "Get Final Key" : "Go to Checkpoint 2";
        } else {
            if (currentStep > 2) {
                stepText.innerText = "All checkpoints completed! Claim your key below.";
                actionBtn.innerText = "Unlock Key";
            } else {
                stepText.innerText = `You are currently on Checkpoint ${currentStep} of 2.`;
                actionBtn.innerText = `Start Checkpoint ${currentStep}`;
            }
        }
    }

    function processNextStep() {
        const urlParams = new URLSearchParams(window.location.search);
        const hasHash = urlParams.has('hash');

        if (hasHash) {
            // Advance the step counter since they have a fresh hash token
            currentStep++;
            localStorage.setItem('key_step', currentStep);
            
            // Clean up the URL string so they don't reuse the old hash parameter
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        if (currentStep === 1) {
            window.location.href = linkvertiseLinks[1];
        } else if (currentStep === 2) {
            window.location.href = linkvertiseLinks[2];
        } else {
            // Reset counter for next time and redirect to final key site
            localStorage.removeItem('key_step');
            window.location.href = TARGET_FINAL_URL;
        }
    }

    // Run UI Check on window load
    window.onload = updateUI;
</script>

</body>
</html>
