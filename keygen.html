<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification System</title>
    
    <!-- Linkvertise Full Page Script -->
    <script src="https://publisher.linkvertise.com/cdn/linkvertise.js"></script>
    <script>
        linkvertise(4752730, {
            whitelist: [
                "https://rblxscripts2.vercel.app/",
                "https://rblxscripts2.vercel.app/getkey",
                "https://rblxscripts2.vercel.app/keygen"
            ], 
            blacklist: []
        });
    </script>

    <style>
        body {
            background-color: #0f0f12;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #17171c;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #232329;
        }
        h1 { font-size: 26px; margin-bottom: 8px; color: #39da8a; font-weight: 700; }
        p { color: #a3a3a3; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            background-color: #39da8a;
            color: #000000;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            width: 80%;
        }
        .btn:hover { background-color: #2bbd73; transform: translateY(-2px); }
        .step-indicator {
            margin-top: 20px;
            font-size: 12px;
            color: #61616a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 id="title-text">Checkpoint 1</h1>
    <p id="status-text">Complete the short advertising steps on Linkvertise to unlock your execution key.</p>
    
    <!-- data-lv-skip prevents the Linkvertise Full Script from breaking or re-routing this anchor -->
    <a href="#" id="primary-link" data-lv-skip="true" class="btn" onclick="handleNavigation(event)">
        Proceed to Linkvertise
    </a>

    <div class="step-indicator" id="step-badge">Step 1 of 3</div>
</div>

<script>
    // System Routes
    const BASE_SITE = "https://rblxscripts2.vercel.app/";
    const TARGET_FINAL_URL = "https://rblxscripts2.vercel.app/getkey";

    // Track user checkpoint using localStorage
    let currentStep = parseInt(localStorage.getItem('user_checkpoint')) || 1;

    // Define the distinct Linkvertise links generated from your Linkvertise panel
    // Note: Make sure the target url inside Linkvertise panel points back to your Vercel URL
    const stepLinks = {
        1: "https://link-target.net", 
        2: "https://link-target.net"
    };

    function checkSystemState() {
        const urlParams = new URLSearchParams(window.location.search);
        const hasHash = urlParams.has('hash');
        
        const titleText = document.getElementById('title-text');
        const statusText = document.getElementById('status-text');
        const actionBtn = document.getElementById('primary-link');
        const stepBadge = document.getElementById('step-badge');

        // If user returns with a valid Linkvertise token hash
        if (hasHash) {
            if (currentStep === 1) {
                currentStep = 2;
                localStorage.setItem('user_checkpoint', 2);
                window.history.replaceState({}, document.title, window.location.pathname);
            } else if (currentStep === 2) {
                currentStep = 3;
                localStorage.setItem('user_checkpoint', 3);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        // Update UI dynamically depending on the current user checkpoint
        if (currentStep === 1) {
            titleText.innerText = "Checkpoint 1";
            statusText.innerText = "Click the button below to start the verification process.";
            actionBtn.innerText = "Go to Checkpoint 1";
            stepBadge.innerText = "Step 1 of 3";
        } else if (currentStep === 2) {
            titleText.innerText = "Checkpoint 2";
            statusText.innerText = "Checkpoint 1 cleared! Complete the next step to finish.";
            actionBtn.innerText = "Go to Checkpoint 2";
            stepBadge.innerText = "Step 2 of 3";
        } else {
            titleText.innerText = "Access Granted";
            statusText.innerText = "Verification successful! You can now access your key.";
            actionBtn.innerText = "Get Final Key";
            stepBadge.innerText = "Step 3 of 3";
            actionBtn.style.backgroundColor = "#ffeb3b";
        }
    }

    function handleNavigation(event) {
        event.preventDefault(); // Break script hijacking 

        if (currentStep === 1) {
            window.location.replace(stepLinks[1]);
        } else if (currentStep === 2) {
            window.location.replace(stepLinks[2]);
        } else {
            // Clean out local session memory on success payout
            localStorage.removeItem('user_checkpoint');
            window.location.replace(TARGET_FINAL_URL);
        }
    }

    // Execute state evaluation on page load
    window.onload = checkSystemState;
</script>

</body>
</html>
