<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification System</title>
    
    <style>
        body {
            background-color: #0f0f12;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #17171c;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #232329;
        }
        h1 { font-size: 26px; margin-bottom: 8px; color: #39da8a; font-weight: 700; }
        p { color: #a3a3a3; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            background-color: #39da8a;
            color: #000000;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            width: 80%;
        }
        .btn:hover { background-color: #2bbd73; transform: translateY(-2px); }
        .step-indicator {
            margin-top: 20px;
            font-size: 12px;
            color: #61616a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 id="title-text">Checkpoint 1</h1>
    <p id="status-text">Complete the advertising steps on Linkvertise to unlock your final execution key.</p>
    
    <a href="#" id="primary-link" class="btn" onclick="handleNavigation(event)">
        Go to Checkpoint 1
    </a>

    <div class="step-indicator" id="step-badge">Step 1 of 1</div>
</div>

<script>
    // System Configurations
    const USER_ID = "4752730";
    const TARGET_FINAL_URL = "https://rblxscripts2.vercel.app/getkey";

    // Track steps locally (1 = Step 1, 2 = Access Granted / Final Step)
    let currentStep = parseInt(localStorage.getItem("user_checkpoint")) || 1;

    // Generates the random alphanumeric string contextually hidden
    function generateRandomId() {
        const letters = "abcdefghijklmnopqrstuvwxyz";
        const numbers = "0123456789";
        let text = letters.charAt(Math.floor(Math.random() * letters.length));
        for (let i = 0; i < 4; i++) {
            text += numbers.charAt(Math.floor(Math.random() * numbers.length));
        }
        return "id=" + text;
    }

    // Automatically structures the Linkvertise API wrapper URL
    function buildLinkvertiseUrl(stepName) {
        const generatedId = generateRandomId();
        const baseDestination = "https://rblxscripts2.vercel.app/keygen?status=" + stepName + "&" + generatedId;
        
        // Base64 encoding hides strings to clear automated filters
        const cleanDestination = btoa(baseDestination);
        
        return "https://linkvertise.com/" + USER_ID + "/" + Math.random().toString(36).substring(7) + "/dynamic?r=" + cleanDestination;
    }

    function checkSystemState() {
        const urlParams = new URLSearchParams(window.location.search);
        const incomingStatus = urlParams.get("status");
        
        const titleText = document.getElementById("title-text");
        const statusText = document.getElementById("status-text");
        const actionBtn = document.getElementById("primary-link");
        const stepBadge = document.getElementById("step-badge");

        // Evaluates checkback verification flags
        if (incomingStatus === "checkpoint1" && currentStep === 1) {
            currentStep = 2;
            localStorage.setItem("user_checkpoint", 2);
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Clean interface adjustments based on a 2-step setup
        if (currentStep === 1) {
            titleText.innerText = "Checkpoint 1";
            statusText.innerText = "Click below to auto-generate and complete your verification checkpoint,we wil generate you a permanent key.";
            actionBtn.innerText = "Go to Checkpoint 1";
            stepBadge.innerText = "Step 1 of 1";
        } else {
            titleText.innerText = "Access Granted";
            statusText.innerText = "Verification complete! Click below to claim your script key.";
            actionBtn.innerText = "Get Final Key";
            stepBadge.innerText = "Step 2 of 2";
            actionBtn.style.backgroundColor = "#ffeb3b";
        }
    }

    function handleNavigation(event) {
        event.preventDefault();

        if (currentStep === 1) {
            window.location.href = buildLinkvertiseUrl("checkpoint1");
        } else {
            // Clean out local session data on final redirect target execution
            localStorage.removeItem("user_checkpoint");
            window.location.href = TARGET_FINAL_URL;
        }
    }

    window.onload = checkSystemState;
</script>

</body>
</html>
