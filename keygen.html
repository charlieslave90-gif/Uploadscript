    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifetime Key Verification</title>
    
    <style>
        body {
            background-color: #0f0f12;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #17171c;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #232329;
            position: relative;
            z-index: 10;
        }
        h1 { font-size: 26px; margin-bottom: 8px; color: #39da8a; font-weight: 700; }
        p { color: #a3a3a3; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            background-color: #39da8a;
            color: #000000;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            width: 80%;
        }
        .btn:hover { background-color: #2bbd73; transform: translateY(-2px); }
        .step-indicator {
            margin-top: 20px;
            font-size: 12px;
            color: #61616a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>

<body>

<!-- Main UI Card -->
<div class="card">
    <h1 id="title-text">Checkpoint 1</h1>
    <p id="status-text">Complete the verification process to claim your permanent Lifetime Key access.</p>
    
    <a href="#" id="primary-link" class="btn" onclick="handleNavigation(event)">
        Go to Checkpoint 1
    </a>

    <div class="step-indicator" id="step-badge">Step 1 of 2</div>
</div>

<script>
    const USER_ID = "4752730";
    const WORK_INK_URL = "https://work.ink/2AW6/getkey067";
    const TARGET_FINAL_URL = "https://rblxscripts2.vercel.app/getkey";

    // Pull the real step from browser memory
    let currentStep = parseInt(localStorage.getItem("secure_step")) || 1;

    function buildLinkvertiseUrl() {
        const baseDestination = window.location.origin + window.location.pathname;
        const cleanDestination = btoa(baseDestination);
        
        return "https://linkvertise.com/" + USER_ID + "/" + Math.random().toString(36).substring(7) + "/dynamic?r=" + cleanDestination;
    }

    function renderUI() {
        const titleText = document.getElementById("title-text");
        const statusText = document.getElementById("status-text");
        const actionBtn = document.getElementById("primary-link");
        const stepBadge = document.getElementById("step-badge");

        if (currentStep === 1) {
            titleText.innerText = "Checkpoint 1";
            statusText.innerText = "Complete Step 1 to begin initializing your Lifetime Key configuration.";
            actionBtn.innerText = "Go to Checkpoint 1";
            stepBadge.innerText = "Step 1 of 2";
        } else if (currentStep === 2) {
            titleText.innerText = "Checkpoint 2";
            statusText.innerText = "Final Step! Complete this verification link to instantly claim your Lifetime Key.";
            actionBtn.innerText = "Go to Checkpoint 2";
            stepBadge.innerText = "Step 2 of 2";
        } else {
            titleText.innerText = "Access Granted";
            statusText.innerText = "Success! Click below to claim your permanent Lifetime Key.";
            actionBtn.innerText = "Claim Lifetime Key";
            stepBadge.innerText = "Verification Complete";
            actionBtn.style.backgroundColor = "#ffeb3b";
        }
    }

    function handleNavigation(event) {
        event.preventDefault();

        if (currentStep === 1) {
            // Locks step 2 into storage the absolute millisecond they click
            localStorage.setItem("secure_step", 2);
            window.location.href = buildLinkvertiseUrl();
        } else if (currentStep === 2) {
            // Locks step 3 (Access Granted) and routes directly to the Work.ink path
            localStorage.setItem("secure_step", 3);
            window.location.href = WORK_INK_URL;
        } else {
            // Reset only after successfully reclaiming the final key
            localStorage.removeItem("secure_step");
            window.location.href = TARGET_FINAL_URL;
        }
    }

    // Run layout rendering immediately on load
    window.onload = renderUI;
</script>

</body>
</html>
