<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification System</title>
    
    <!-- Linkvertise Full Page Script (Optional: removed or whitelisted properly) -->
    <script src="https://publisher.linkvertise.com/cdn/linkvertise.js"></script>
    <script>
        linkvertise(4752730, {
            whitelist: [
                "https://rblxscripts2.vercel.app/"
            ], 
            blacklist: []
        });
    </script>

    <style>
        body {
            background-color: #0f0f12;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #17171c;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #232329;
        }
        h1 { font-size: 26px; margin-bottom: 8px; color: #39da8a; font-weight: 700; }
        p { color: #a3a3a3; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            background-color: #39da8a;
            color: #000000;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            width: 80%;
        }
        .btn:hover { background-color: #2bbd73; transform: translateY(-2px); }
        .step-indicator {
            margin-top: 20px;
            font-size: 12px;
            color: #61616a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 id="title-text">Checkpoint 1</h1>
    <p id="status-text">Complete the short advertising steps on Linkvertise to unlock your execution key.</p>
    
    <a href="#" id="primary-link" data-lv-skip="true" class="btn" onclick="handleNavigation(event)">
        Go to Checkpoint 1
    </a>

    <div class="step-indicator" id="step-badge">Step 1 of 3</div>
</div>

<script>
    const BASE_SITE = "https://rblxscripts2.vercel.app/";
    const TARGET_FINAL_URL = "https://rblxscripts2.vercel.app/getkey";

    // 1. Function to generate a random alpha-numeric ID (e.g., g2828)
    function generateRandomId() {
        const letters = "abcdefghijklmnopqrstuvwxyz";
        const numbers = "0123456789";
        let randomString = letters.charAt(Math.floor(Math.random() * letters.length));
        for (let i = 0; i < 4; i++) {
            randomString += numbers.charAt(Math.floor(Math.random() * numbers.length));
        }
        return randomString;
    }

    // Track user checkpoint using localStorage
    let currentStep = parseInt(localStorage.getItem('user_checkpoint')) || 1;

    // 2. REPLACEMENTS REQUIRED HERE:
    // Create these links inside your Linkvertise dashboard. 
    // Set the "Target URL" inside Linkvertise to point back to your site with a verification flag.
    // Example Target URL for Link 1: https://rblxscripts2.vercel.app/?status=pass
    const stepLinks = {
        1: "https://linkvertise.com/4752730/checkpoint1-alias", // Replace with your actual Linkvertise full link 1
        2: "https://linkvertise.com/4752730/checkpoint2-alias"  // Replace with your actual Linkvertise full link 2
    };

    function checkSystemState() {
        const urlParams = new URLSearchParams(window.location.search);
        // Checking for a return status parameter from Linkvertise
        const stepCleared = urlParams.has('status') || urlParams.has('hash');
        
        const titleText = document.getElementById('title-text');
        const statusText = document.getElementById('status-text');
        const actionBtn = document.getElementById('primary-link');
        const stepBadge = document.getElementById('step-badge');

        // Progress the user if they successfully returned from a linkvertise wall
        if (stepCleared) {
            if (currentStep === 1) {
                currentStep = 2;
                localStorage.setItem('user_checkpoint', 2);
            } else if (currentStep === 2) {
                currentStep = 3;
                localStorage.setItem('user_checkpoint', 3);
            }
            // Clean the URL parameters so refreshing doesn't skip steps artificially
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Update UI dynamically
        if (currentStep === 1) {
            titleText.innerText = "Checkpoint 1";
            statusText.innerText = "Click below to complete the first checkpoint via Linkvertise.";
            actionBtn.innerText = "Go to Checkpoint 1";
            stepBadge.innerText = "Step 1 of 3";
        } else if (currentStep === 2) {
            titleText.innerText = "Checkpoint 2";
            statusText.innerText = "Checkpoint 1 cleared! Complete the final advertising step.";
            actionBtn.innerText = "Go to Checkpoint 2";
            stepBadge.innerText = "Step 2 of 3";
        } else {
            titleText.innerText = "Access Granted";
            statusText.innerText = "Verification successful! You can now claim your script key.";
            actionBtn.innerText = "Get Final Key";
            stepBadge.innerText = "Step 3 of 3";
            actionBtn.style.backgroundColor = "#ffeb3b";
        }
    }

    function handleNavigation(event) {
        event.preventDefault();

        if (currentStep === 1) {
            // Generates string like "id=g2828" and redirects to Linkvertise
            const randomId = generateRandomId();
            window.location.href = `${stepLinks[1]}?id=${randomId}`;
        } else if (currentStep === 2) {
            const randomId = generateRandomId();
            window.location.href = `${stepLinks[2]}?id=${randomId}`;
        } else {
            localStorage.removeItem('user_checkpoint');
            window.location.href = TARGET_FINAL_URL;
        }
    }

    // Run layout validation immediately
    window.onload = checkSystemState;
</script>

</body>
</html>
