<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>
        <button class="copy-btn" onclick="copyPaste()">📋 Copy Content</button>
        <pre id="modalContent"></pre>

<div id="toast" class="toast">Copied to clipboard!</div>

<script>
    const API_URL = window.location.origin + '/api.php';
    
    async function loadPastes() {
        try {
            const response = await fetch(`${API_URL}?action=getAll`);
            const data = await response.json();
            
            if (data.success) {
                displayPastes(data.pastes);
            } else {
                document.getElementById('pastesGrid').innerHTML = '<div class="loading">No pastes found</div>';
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('pastesGrid').innerHTML = '<div class="loading">Error loading pastes</div>';
        }
    }
    
    function displayPastes(pastes) {
        const grid = document.getElementById('pastesGrid');
        if (!pastes || pastes.length === 0) {
            grid.innerHTML = '<div class="loading">No pastes yet</div>';
            return;
        }
        
        grid.innerHTML = pastes.map(paste => `
            <div class="paste-card" onclick="viewPaste('${paste.paste_id}')">
                <div class="paste-title">${escapeHtml(paste.title)}</div>
                <div class="paste-preview">${escapeHtml(paste.content.substring(0, 100))}...</div>
                <div class="paste-date">📅 ${new Date(paste.created_at).toLocaleDateString()} | 👁️ ${paste.views} views</div>
            </div>
        `).join('');
    }
    
    async function viewPaste(pasteId) {
        try {
            const response = await fetch(`${API_URL}?action=get&id=${pasteId}`);
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('modalTitle').innerText = data.paste.title;
                document.getElementById('modalContent').innerText = data.paste.content;
                document.getElementById('modal').style.display = 'block';
                
                // Increment view count
                fetch(`${API_URL}?action=view&id=${pasteId}`, { method: 'POST' });
            }
        } catch (error) {
            console.error('Error:', error);
        }
    }
    
    function searchPastes() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.paste-card');
        
        cards.forEach(card => {
            const title = card.querySelector('.paste-title').innerText.toLowerCase();
            if (title.includes(searchTerm)) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    }
    
    function copyPaste() {
        const content = document.getElementById('modalContent').innerText;
        navigator.clipboard.writeText(content).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        });
    }
    
    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    window.onclick = function(event) {
        if (event.target == document.getElementById('modal')) {
            closeModal();
        }
    }
    
    loadPastes();
</script>
