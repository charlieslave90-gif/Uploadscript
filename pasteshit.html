<div id="modal" class="modal">

<div id="toast" class="toast">Copied to clipboard!</div>

<script>
    const API_URL = window.location.origin + '/api.php';
    let currentPasteId = null;
    let currentPasteText = null;
    
    async function loadPastes() {
        try {
            const response = await fetch(`${API_URL}?action=getAll`);
            const data = await response.json();
            
            if (data.success) {
                displayPastes(data.pastes);
            } else {
                document.getElementById('pastesGrid').innerHTML = '<div class="loading">No pastes found</div>';
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('pastesGrid').innerHTML = '<div class="loading">Error loading pastes</div>';
        }
    }
    
    function displayPastes(pastes) {
        const grid = document.getElementById('pastesGrid');
        if (!pastes || pastes.length === 0) {
            grid.innerHTML = '<div class="loading">No pastes yet</div>';
            return;
        }
        
        grid.innerHTML = pastes.map(paste => `
            <div class="paste-card">
                <div class="paste-title" onclick="viewPaste('${paste.paste_id}')">${escapeHtml(paste.title)}</div>
                <div class="paste-preview" onclick="viewPaste('${paste.paste_id}')">${escapeHtml(paste.content.substring(0, 100))}...</div>
                <div class="paste-date">📅 ${new Date(paste.created_at).toLocaleDateString()} | 👁️ ${paste.views} views</div>
                <div class="paste-id">🆔 ID: ${paste.paste_id}</div>
                <div class="button-group">
                    <button class="small-btn copy-text" onclick="copyPasteText('${paste.paste_id}')">📋 Copy Text</button>
                    <button class="small-btn copy-link" onclick="copyPasteLink('${paste.paste_id}')">🔗 Copy Link</button>
                    <button class="small-btn view-btn" onclick="viewPaste('${paste.paste_id}')">👁️ View</button>
                </div>
            </div>
        `).join('');
    }
    
    async function copyPasteText(pasteId) {
        try {
            const response = await fetch(`${API_URL}?action=get&id=${pasteId}`);
            const data = await response.json();
            
            if (data.success) {
                await navigator.clipboard.writeText(data.paste.content);
                showToast('✅ Text copied to clipboard!');
            } else {
                showToast('❌ Failed to copy text');
            }
        } catch (error) {
            console.error('Error:', error);
            showToast('❌ Error copying text');
        }
    }
    
    function copyPasteLink(pasteId) {
        const shareUrl = `${window.location.origin}${window.location.pathname}?id=${pasteId}`;
        navigator.clipboard.writeText(shareUrl).then(() => {
            showToast('✅ Share link copied to clipboard!');
        }).catch(() => {
            showToast('❌ Failed to copy link');
        });
    }
    
    async function viewPaste(pasteId) {
        currentPasteId = pasteId;
        try {
            const response = await fetch(`${API_URL}?action=get&id=${pasteId}`);
            const data = await response.json();
            
            if (data.success) {
                currentPasteText = data.paste.content;
                document.getElementById('modalTitle').innerText = data.paste.title;
                document.getElementById('modalContent').innerText = data.paste.content;
                document.getElementById('modal').style.display = 'block';
                
                // Increment view count
                fetch(`${API_URL}?action=view&id=${pasteId}`, { method: 'POST' });
                
                // Reload to update view counts
                setTimeout(() => loadPastes(), 500);
            }
        } catch (error) {
            console.error('Error:', error);
        }
    }
    
    function copyModalText() {
        if (currentPasteText) {
            navigator.clipboard.writeText(currentPasteText).then(() => {
                showToast('✅ Text copied to clipboard!');
            });
        }
    }
    
    function copyModalLink() {
        if (currentPasteId) {
            const shareUrl = `${window.location.origin}${window.location.pathname}?id=${currentPasteId}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast('✅ Share link copied to clipboard!');
            });
        }
    }
    
    function searchPastes() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.paste-card');
        
        cards.forEach(card => {
            const title = card.querySelector('.paste-title').innerText.toLowerCase();
            if (title.includes(searchTerm)) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    }
    
    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        currentPasteId = null;
        currentPasteText = null;
    }
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Check URL for direct paste ID
    function checkUrlForPaste() {
        const urlParams = new URLSearchParams(window.location.search);
        const pasteId = urlParams.get('id');
        if (pasteId) {
            setTimeout(() => viewPaste(pasteId), 500);
        }
    }
    
    window.onclick = function(event) {
        if (event.target == document.getElementById('modal')) {
            closeModal();
        }
    }
    
    loadPastes();
    checkUrlForPaste();
</script>
